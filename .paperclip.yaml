skills:
  - slug: health-app-apple-health
    name: "Health: app-apple-health"
    path: "health/skills/app-apple-health/SKILL.md"
    sourceType: local
    description: "Exports iPhone Health data — steps, active energy, resting heart rate, body weight, and workouts — via an iOS Shortcut that saves a CSV or XML export to iCloud Drive for automatic Mac sync. No API key required; uses device-local export. The health agent reads the synced file from the configured iCloud Drive path. Owns dedup and append into vault/health/00_current/wearable-log.csv: every ingest checks each incoming row's date against existing dates and writes only new records. Can be used standalone or alongside Oura Ring. Configure the iCloud export path in vault/health/config.md."
  - slug: health-app-mychart.portal
    name: "Health: app-mychart.portal"
    path: "health/skills/app-mychart.portal/SKILL.md"
    sourceType: local
    description: "Accesses patient portal records — lab results (PDF and structured values), visit notes, after-visit summaries, upcoming appointments, current medication list, and immunization records — from a provider's MyChart instance via Playwright with Chrome cookie authentication. Used by the health agent to download clinical data for local review and vault storage. Requires headless=False due to Chrome app-bound encryption. Configure your provider's portal URL and username in vault/health/config.md."
  - slug: health-app-oura-ring.api
    name: "Health: app-oura-ring.api"
    path: "health/skills/app-oura-ring.api/SKILL.md"
    sourceType: local
    description: "Fetches daily sleep, readiness, and activity data from the Oura Ring API v2 using a personal API key. Returns sleep score, total sleep duration, deep/REM/light sleep stages, HRV RMSSD (nightly), resting heart rate, readiness score (0-100), steps, and active calories. Owns dedup and append into vault/health/00_current/wearable-log.csv: every fetch checks each incoming day's date against existing rows and appends only records not already present. Used by the health agent for wearable data sync, 90-day baseline trend analysis, and anomaly detection. Configure API key in vault/health/config.md."
  - slug: health-flow-build-hsa-utilization-summary
    name: "Health: flow-build-hsa-utilization-summary"
    path: "health/skills/flow-build-hsa-utilization-summary/SKILL.md"
    sourceType: local
    description: "Builds a monthly HSA (Health Savings Account) utilization summary. Reports YTD qualified spend, current cash balance, current invested balance, contribution status vs annual limit, and a check against the configured invest-above threshold (default $2,000 cash buffer). Categorizes spend by IRS Publication 502 category. Flags receipts missing for any HSA withdrawal (audit risk). HSA balances and statements are uploaded manually since most HSA custodians lack a public API."
  - slug: health-flow-build-lab-summary
    name: "Health: flow-build-lab-summary"
    path: "health/skills/flow-build-lab-summary/SKILL.md"
    sourceType: local
    description: "Builds a structured lab result summary with current biomarker values, reference ranges, trend direction vs. the prior panel, and out-of-range items surfaced first within each panel group. Compares glucose, A1c, LDL, HDL, TSH, creatinine, CBC, and all metabolic markers against clinical reference ranges and flags deviations with severity tier (borderline, elevated, critical)."
  - slug: health-flow-build-wellness-summary
    name: "Health: flow-build-wellness-summary"
    path: "health/skills/flow-build-wellness-summary/SKILL.md"
    sourceType: local
    description: "Compiles a monthly wearable wellness summary covering sleep score, sleep duration, HRV (RMSSD), resting heart rate, readiness score, daily steps, and active energy. Calculates 30-day averages, compares to the prior 30-day period and the 90-day rolling baseline, and flags any metric deviating more than 15% from baseline. Supports Oura Ring and Apple Health as data sources."
  - slug: health-flow-eob-reconciliation
    name: "Health: flow-eob-reconciliation"
    path: "health/skills/flow-eob-reconciliation/SKILL.md"
    sourceType: local
    description: "Reads Explanation of Benefits (EOBs) from the user's health insurance carrier and matches each to the corresponding provider bill. Flags discrepancies between billed amount, insurance-paid amount, and patient responsibility. Detects duplicate charges, balance billing for in-network services, and surprise out-of-network charges. Tracks YTD deductible-met and out-of-pocket-max progress. Big quality-of-life skill — most users overpay because EOBs and bills aren't reconciled."
  - slug: health-flow-fitness-goal-review
    name: "Health: flow-fitness-goal-review"
    path: "health/skills/flow-fitness-goal-review/SKILL.md"
    sourceType: local
    description: "Tracks fitness behaviors against user-configured goals: weight target, daily step floor, exercise minutes per week, resistance-training session count per week, and any user-defined cardio goal. Distinct from sleep/HRV wellness review — this is about the physical-activity behavior side. Pulls activity data from app-apple-health and/or app-oura-ring.api outputs. Reports progress vs goals with trend deltas."
  - slug: health-flow-prep-appointment-brief
    name: "Health: flow-prep-appointment-brief"
    path: "health/skills/flow-prep-appointment-brief/SKILL.md"
    sourceType: local
    description: "Builds a 24-hour pre-visit packet for an upcoming appointment. Aggregates last-visit summary, current medication list, open lab flags with trend deltas, vitals trend since last visit, and three prepared questions tailored to the appointment type (annual physical, follow-up, specialist). Produces a single one-page brief the user can print or read on the way to the appointment. PHI is redacted before any text leaves the vault folder."
  - slug: health-flow-reconcile-medications-post-visit
    name: "Health: flow-reconcile-medications-post-visit"
    path: "health/skills/flow-reconcile-medications-post-visit/SKILL.md"
    sourceType: local
    description: "After a visit note or after-visit summary lands in the vault, diffs the new prescriptions and discontinuations against the active medication list. Adds new prescriptions, marks discontinued meds inactive, updates dose changes, and writes a reconciliation note. Closes the \"medication list current after every visit\" non-negotiable that monthly medication reviews don't address. Distinct from refill tracking — this is about list correctness, not supply management."
  - slug: health-op-anomaly-watch
    name: "Health: op-anomaly-watch"
    path: "health/skills/op-anomaly-watch/SKILL.md"
    sourceType: local
    description: "Weekly wearable anomaly watch. Syncs the latest Oura Ring or Apple Health export, computes a 90-day rolling baseline for HRV, sleep score, resting heart rate, and readiness, and flags any metric that has deviated more than 2 standard deviations from its baseline in the past 7 days. Triggers: \"weekly health check\", \"check my wearable data\", \"anomaly scan\", \"how is my HRV this week\"."
  - slug: health-op-appointment-readiness
    name: "Health: op-appointment-readiness"
    path: "health/skills/op-appointment-readiness/SKILL.md"
    sourceType: local
    description: "Scans for medical appointments inside the next 7 days, triggers flow-prep-appointment-brief for each, and verifies in-network status with the user's health insurance carrier before any elective visit or procedure. Closes the \"preparation is the gift\" non-negotiable — no appointment happens without a brief, no elective happens without coverage verification. Surfaces missing coverage, missing prior-visit summary, or out-of-network providers as HIGH-severity open-loops."
  - slug: health-op-lab-review
    name: "Health: op-lab-review"
    path: "health/skills/op-lab-review/SKILL.md"
    sourceType: local
    description: "Triggered when new lab results arrive from a patient portal (MyChart/Epic) or are uploaded manually. Parses each biomarker against clinical reference ranges (glucose, A1c, LDL, HDL, TSH, creatinine, CBC, and more), flags out-of-range values with severity tier, and builds a structured panel summary grouped by test category with trend arrows vs. the prior panel. Triggers: \"lab results came in\", \"new lab report\", \"blood work is ready\", \"process my labs\"."
  - slug: health-op-medication-review
    name: "Health: op-medication-review"
    path: "health/skills/op-medication-review/SKILL.md"
    sourceType: local
    description: "Monthly medication review. Reads the active prescription list in vault/health/ 05_medications/, calculates days remaining before each refill window opens (applying 7-day buffers for 90-day supplies and 3-day buffers for 30-day supplies), flags medications due within 30 days, checks each against the IRS HSA-eligible expense list, and logs all findings to open-loops.md. Triggers: \"medication review\", \"check my refills\", \"monthly med check\", \"am I running out of anything\"."
  - slug: health-op-monthly-sync
    name: "Health: op-monthly-sync"
    path: "health/skills/op-monthly-sync/SKILL.md"
    sourceType: local
    description: "Full health data sync on the 1st of each month. Pulls new wearable exports (Oura Ring or Apple Health), downloads visit notes and lab results from the configured patient portal (MyChart), refreshes the medication list, updates the deductible and HSA balance from the insurance log, and organizes all new files in vault. Then triggers the Health Review Brief. Triggers: \"health monthly sync\", \"sync health data\", \"refresh health vault\", \"run my health sync\"."
  - slug: health-op-preventive-care-review
    name: "Health: op-preventive-care-review"
    path: "health/skills/op-preventive-care-review/SKILL.md"
    sourceType: local
    description: "Quarterly preventive care check. Reads the personal care schedule from vault/health/ 03_preventive/ and compares each screening against its last-completed date and recommended recurrence interval. Flags overdue items with urgency tier and scheduling action. Covers: annual physical, dental 2x/year, eye exam annually, colonoscopy at 45+, mammogram, dermatology, flu shot, and provider-configured items. Triggers: \"preventive care review\", \"check my screenings\", \"what checkups am I overdue for\", \"preventive health review\"."
  - slug: health-op-review-brief
    name: "Health: op-review-brief"
    path: "health/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Monthly health review brief. Compiles a composite wellness score from wearable trends, lab flags from the most recent panel, medication refill status, health cost YTD and HSA balance, and preventive care gaps into a single briefing document with prioritized action items. Triggers: \"health brief\", \"health review\", \"monthly health summary\", \"how is my health\", \"give me my health report\"."
  - slug: health-op-symptom-log-review
    name: "Health: op-symptom-log-review"
    path: "health/skills/op-symptom-log-review/SKILL.md"
    sourceType: local
    description: "For users tracking chronic or episodic symptoms (migraines, allergies, GI issues, joint pain, mental-health symptoms, dermatological flares, etc.), reviews the symptom log, detects temporal patterns (day-of-week, time-of-month, seasonality), and correlates with sleep, HRV, stress, exercise, diet markers, and weather when available. Produces a pattern brief that can be shared with the user's provider. v2 skill — only useful for users who maintain a symptom log; otherwise skipped."
  - slug: health-op-vaccination-tracking
    name: "Health: op-vaccination-tracking"
    path: "health/skills/op-vaccination-tracking/SKILL.md"
    sourceType: local
    description: "Records and reviews vaccination history (childhood + adult) and flags upcoming due vaccinations against the CDC adult immunization schedule: annual flu, COVID boosters per current guidance, Tdap every 10 years, shingles starting at 50, pneumonia at 65, HPV catch-up through 26, and any travel vaccines the user has logged. Reads from any imported immunization records (patient portal export or manual entry)."
  - slug: health-task-attach-trend-context
    name: "Health: task-attach-trend-context"
    path: "health/skills/task-attach-trend-context/SKILL.md"
    sourceType: local
    description: "Given a biomarker name and a current value, returns the prior value, delta, percent change, and a 3-panel direction (improving / stable / worsening) using the biomarker's reference range to determine which direction is favorable. Single primitive enforced across labs, vitals, weight, and any other tracked health metric. Ensures no value is ever shown without context."
  - slug: health-task-flag-out-of-range-value
    name: "Health: task-flag-out-of-range-value"
    path: "health/skills/task-flag-out-of-range-value/SKILL.md"
    sourceType: local
    description: "Writes a structured flag to vault/health/open-loops.md when a lab biomarker falls outside its clinical reference range. Records metadata only — biomarker name, severity tier (borderline, elevated, critical), collection date, panel type, and recommended next action — without storing any raw PHI values. Called by health-lab-review for each out-of-range result."
  - slug: health-task-flag-preventive-care-gap
    name: "Health: task-flag-preventive-care-gap"
    path: "health/skills/task-flag-preventive-care-gap/SKILL.md"
    sourceType: local
    description: "Writes a flag to vault/health/open-loops.md for any overdue or due-soon preventive care screening. Records: care type, last completed date, recommended interval, days overdue, urgency tier (routine/soon/overdue), and a specific scheduling action. Called by health-preventive-care-review for each identified gap."
  - slug: health-task-flag-upcoming-refill
    name: "Health: task-flag-upcoming-refill"
    path: "health/skills/task-flag-upcoming-refill/SKILL.md"
    sourceType: local
    description: "Single entry point for refill flagging. Reads vault/health/00_current/medications.md, computes projected refill dates (fill date + days supply − early-fill buffer), and writes a refill reminder to vault/health/open-loops.md for any prescription due within 30 days. Each entry includes: medication name, pharmacy name and phone, projected refill date, estimated out-of-pocket cost, HSA eligibility flag, auto-refill status, controlled- substance flag, and urgency tier (HIGH ≤7 days, MEDIUM 8–21 days, LOW 22–30 days). Called directly by health-medication-review — replaces the prior flow-check-refill-dates step."
  - slug: health-task-prepare-emergency-medical-info
    name: "Health: task-prepare-emergency-medical-info"
    path: "health/skills/task-prepare-emergency-medical-info/SKILL.md"
    sourceType: local
    description: "Generates a one-page emergency card containing severe allergies, active medications, major medical conditions, blood type (if known), insurance info, and ICE (in-case-of- emergency) contacts. Output is formatted for wallet print, phone lock-screen image, and Apple Medical ID / Android equivalent. Re-runs whenever any source field changes. Critical for any user; not optional."
  - slug: health-task-redact-phi-for-brief
    name: "Health: task-redact-phi-for-brief"
    path: "health/skills/task-redact-phi-for-brief/SKILL.md"
    sourceType: local
    description: "Deterministic redaction step run on every string destined for vault/health/02_briefs/. Strips direct identifiers (full name, DOB, MRN, SSN, address, phone, email), raw lab numerics (replaced with categorical band: below-range / in-range / above-range plus trend direction), and clinical interpretations that aren't user-authored. Single primitive enforced across labs, flags, briefs, and post-visit summaries. Closes the \"PHI never leaves vault in briefings\" non-negotiable."
  - slug: health-task-track-mental-health
    name: "Health: task-track-mental-health"
    path: "health/skills/task-track-mental-health/SKILL.md"
    sourceType: local
    description: "Captures mood, stress, and sleep-quality entries on a user-configurable cadence (daily or weekly). Stores entries with timestamp and notes. Computes rolling 30-day baseline, flags streaks of low mood / high stress, and surfaces correlations with sleep score and HRV when wearable data is present. Skipped entirely if user opts out. Distinct from symptom logging which is condition-specific."
  - slug: health-task-update-allergy-medication-list
    name: "Health: task-update-allergy-medication-list"
    path: "health/skills/task-update-allergy-medication-list/SKILL.md"
    sourceType: local
    description: "Maintains the single source of truth for drug allergies, food allergies, environmental allergies, adverse reactions, and current active medications — formatted for ER/EMS readability. One file, one format, used by every flow that needs an authoritative allergy/medication picture (appointment briefs, emergency card generation, post-visit reconciliation). Critical because allergy lists drift across portals and providers."
  - slug: health-task-update-family-medical-history
    name: "Health: task-update-family-medical-history"
    path: "health/skills/task-update-family-medical-history/SKILL.md"
    sourceType: local
    description: "Maintains a structured family medical history covering first-degree relatives (parents, siblings, children) and known second-degree conditions (grandparents, aunts, uncles). Captures heart disease, diabetes, cancer types, mental health conditions, autoimmune disease, and any genetic/hereditary conditions. Drives risk-aware preventive-care decisions and informs lab interpretation by other skills."
  - slug: health-task-update-open-loops
    name: "Health: task-update-open-loops"
    path: "health/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "The single write point for vault/health/open-loops.md. Called at the end of every health op and flow. Appends new flags (lab anomalies, wearable deviations, refill reminders, preventive care gaps) with timestamp, source op, and severity. Scans existing entries for items that can be auto-resolved — expired refill reminders, lab flags where the biomarker returned to normal, care gaps that have been completed. Preserves resolved items with resolution date for audit trail."
  - slug: health-task-update-provider-directory
    name: "Health: task-update-provider-directory"
    path: "health/skills/task-update-provider-directory/SKILL.md"
    sourceType: local
    description: "Maintains the single provider directory at vault/health/00_current/provider-directory.md. Each entry: provider name, specialty (PCP, dentist, eye doctor, dermatologist, OB-GYN, mental health, specialist), practice address, phone, patient-portal URL, last-visit date, next-visit date, in-network status with the user's health insurance carrier, and notes. Foundational — every appointment, coverage-verification, and emergency-info skill reads from this file."
  - slug: wealth-app-fidelity.portal
    name: "Wealth: app-fidelity.portal"
    path: "wealth/skills/app-fidelity.portal/SKILL.md"
    sourceType: local
    description: "Accesses brokerage and retirement account data from Fidelity Investments via Playwright with Chrome cookie authentication. Downloads account balances, current holdings with market values, portfolio performance (day/month/YTD/all-time), monthly statements, and tax documents (1099-R, 1099-B, 1099-DIV). Used by the wealth agent for investment review, net worth tracking, and tax document sync. Requires headless=False. Configure Chrome profile path in vault/wealth/config.md."
  - slug: wealth-app-m1-finance.portal
    name: "Wealth: app-m1-finance.portal"
    path: "wealth/skills/app-m1-finance.portal/SKILL.md"
    sourceType: local
    description: "Accesses automated investment portfolio data from M1 Finance via Playwright with Chrome cookie authentication. Downloads portfolio value and total return, pie allocation (target vs. actual percentages), individual positions with cost basis, dividend history, and monthly statements. Also retrieves tax documents (1099-B, 1099-DIV). Used by the wealth agent for investment review, allocation drift analysis, and tax document retrieval. Requires headless=False."
  - slug: wealth-app-monarch-money
    name: "Wealth: app-monarch-money"
    path: "wealth/skills/app-monarch-money/SKILL.md"
    sourceType: local
    description: "Pulls transaction history, spending by category, budget vs. actual, net worth snapshot, and recurring transaction data from Monarch Money via Playwright or CSV export. Monarch aggregates all linked bank, credit card, brokerage, and loan accounts in one place. Used by the wealth agent for cash flow analysis, budget tracking, and cross-institution net worth. Configure email and Chrome profile in vault/wealth/config.md."
  - slug: wealth-flow-analyze-investment-performance
    name: "Wealth: flow-analyze-investment-performance"
    path: "wealth/skills/flow-analyze-investment-performance/SKILL.md"
    sourceType: local
    description: "Reviews all investment accounts — 401k, Roth IRA, Traditional IRA, HSA (invested), taxable brokerage — and calculates 30-day and YTD returns per account. Derives current asset allocation (stocks domestic, stocks international, bonds, cash, real estate) and compares to configured target allocation. Flags any asset class more than 5 percentage points off target with specific rebalancing amounts. Checks 401k contribution pace against the 2025 IRS limit of $23,500."
  - slug: wealth-flow-asset-allocation-drift
    name: "Wealth: flow-asset-allocation-drift"
    path: "wealth/skills/flow-asset-allocation-drift/SKILL.md"
    sourceType: local
    description: "Compares current portfolio mix to user-configured target allocation. Flags any asset class drifted >5% from target (configurable). Supports any allocation strategy: three-fund (US/intl/bond), 60/40, target-date glidepath, custom multi-asset. Generates rebalance recommendations."
  - slug: wealth-flow-benchmark-investment-returns
    name: "Wealth: flow-benchmark-investment-returns"
    path: "wealth/skills/flow-benchmark-investment-returns/SKILL.md"
    sourceType: local
    description: "Computes each taxable / retirement / other investment account's trailing return (1mo, 3mo, YTD, 1y, 3y annualized) and compares against a configured reference benchmark per account type (S&P 500, total bond, target-date fund, custom). Produces alpha/delta and flags persistent underperformance."
  - slug: wealth-flow-build-cash-flow-summary
    name: "Wealth: flow-build-cash-flow-summary"
    path: "wealth/skills/flow-build-cash-flow-summary/SKILL.md"
    sourceType: local
    description: "Summarizes all income and expenses for the month, compares each expense category to its configured budget target, and flags categories more than 20% over budget. Income is aggregated by source: W-2 net pay, rental income, side income, dividends, interest. Expenses are grouped into standard categories: housing, transportation, food, healthcare, subscriptions, entertainment, savings contributions. Calculates net cash flow and MoM comparison for each category."
  - slug: wealth-flow-build-debt-summary
    name: "Wealth: flow-build-debt-summary"
    path: "wealth/skills/flow-build-debt-summary/SKILL.md"
    sourceType: local
    description: "Builds a debt table with outstanding balance, interest rate, minimum monthly payment, projected payoff date at current pace, and total remaining interest cost for each loan. Ranks debts by interest rate (avalanche method). Models two extra-payment scenarios — $100/month and $500/month added to the highest-rate debt — and computes interest savings and payoff acceleration. Flags when a debt hits a meaningful payoff milestone."
  - slug: wealth-flow-build-net-worth-summary
    name: "Wealth: flow-build-net-worth-summary"
    path: "wealth/skills/flow-build-net-worth-summary/SKILL.md"
    sourceType: local
    description: "Aggregates all asset balances and outstanding liabilities into a net worth table with month-over-month delta for each line item. Asset categories: liquid (checking, savings, HYSA), tax-advantaged retirement (401k, Roth IRA, Traditional IRA), tax-advantaged other (HSA, 529), taxable investments (brokerage), and real estate equity. Liabilities listed individually. Flags any account with unexplained movement greater than $500 vs. prior month snapshot."
  - slug: wealth-flow-calculate-emergency-fund-runway
    name: "Wealth: flow-calculate-emergency-fund-runway"
    path: "wealth/skills/flow-calculate-emergency-fund-runway/SKILL.md"
    sourceType: local
    description: "Divides current liquid balance (checking + savings + HYSA + money market) by trailing 3-month average expense burn from cash-flow data. Reports runway in months and compares against the configured emergency-fund floor (default 6 months). Flags shortfall."
  - slug: wealth-flow-concentration-risk
    name: "Wealth: flow-concentration-risk"
    path: "wealth/skills/flow-concentration-risk/SKILL.md"
    sourceType: local
    description: "Flags any single position >10% (configurable) of total portfolio, with extra surfacing for employer-stock concentration (RSUs, ESPP, ISOs, options). Outputs the position's share of portfolio + dollar value, plus diversification recommendation."
  - slug: wealth-flow-flag-account-anomalies
    name: "Wealth: flow-flag-account-anomalies"
    path: "wealth/skills/flow-flag-account-anomalies/SKILL.md"
    sourceType: local
    description: "Detects accounts with month-over-month change >5% (configurable) or transactions >$500 not previously seen in the account's history. Writes findings to open-loops with severity. Distinct from task-flag-budget-variance (which checks category spend against budget); this scans account-level balance and transaction streams for unexpected moves."
  - slug: wealth-flow-retirement-on-track
    name: "Wealth: flow-retirement-on-track"
    path: "wealth/skills/flow-retirement-on-track/SKILL.md"
    sourceType: local
    description: "Given current retirement balances, savings rate, target retirement age, and target annual spend in retirement, projects probability of reaching the retirement number using configurable assumptions (default: 4% safe withdrawal, 7% real return on stocks, 2% inflation). Reports projected balance at target age, the gap (if any), and what change closes it (years longer, save more, spend less)."
  - slug: wealth-flow-separate-income-streams
    name: "Wealth: flow-separate-income-streams"
    path: "wealth/skills/flow-separate-income-streams/SKILL.md"
    sourceType: local
    description: "Categorizes inflows from cash-flow data into distinct streams (W-2, self-employment, rental, dividends/interest, other) with totals and volatility per stream. Each stream is reported separately because they have different tax character, reliability, and cash-flow planning implications."
  - slug: wealth-flow-tax-efficient-account-placement
    name: "Wealth: flow-tax-efficient-account-placement"
    path: "wealth/skills/flow-tax-efficient-account-placement/SKILL.md"
    sourceType: local
    description: "Reviews asset location across taxable, tax-deferred (Traditional 401k/IRA), and tax-free (Roth, HSA-invested) accounts. Flags suboptimal placement: bonds in taxable (tax-inefficient interest), high-growth in Traditional (taxed at ordinary income on withdrawal), low-yield in Roth (waste of tax-free space). Recommends asset moves."
  - slug: wealth-op-accountant-packet
    name: "Wealth: op-accountant-packet"
    path: "wealth/skills/op-accountant-packet/SKILL.md"
    sourceType: local
    description: "Compiles the complete year-end accountant / tax-prep packet by January 31. Aggregates W-2s, 1099s, 1098s, 1095s, K-1s, deduction summaries, charitable-giving summaries, estimated-payment records, and net-worth and cash-flow summaries into a single zip/folder ready to hand to a CPA or upload to TurboTax. Cross-domain with tax plugin."
  - slug: wealth-op-cash-flow-review
    name: "Wealth: op-cash-flow-review"
    path: "wealth/skills/op-cash-flow-review/SKILL.md"
    sourceType: local
    description: "Monthly income vs. expense review. Aggregates all income sources (W-2 net, rental, business, dividends) and expense categories (housing, food, transportation, healthcare, subscriptions, entertainment, savings contributions), compares each category to its configured budget target, and flags variances greater than 20%. Calculates savings rate and net cash flow. Triggers: \"cash flow review\", \"check my spending\", \"am I over budget\", \"monthly budget review\", \"how much did I spend this month\"."
  - slug: wealth-op-debt-review
    name: "Wealth: op-debt-review"
    path: "wealth/skills/op-debt-review/SKILL.md"
    sourceType: local
    description: "Quarterly debt review. Calculates payoff timelines and total remaining interest cost for all outstanding loans (mortgage, auto, student, credit card, personal). Ranks by interest rate (avalanche method). Models $100/month and $500/month extra-payment scenarios showing interest savings and payoff acceleration. Flags debt milestones. Triggers: \"debt review\", \"payoff timeline\", \"how much interest am I paying\", \"model extra payments\", \"debt summary\"."
  - slug: wealth-op-estate-plan-review
    name: "Wealth: op-estate-plan-review"
    path: "wealth/skills/op-estate-plan-review/SKILL.md"
    sourceType: local
    description: "Annual estate-plan freshness check: verifies will / trust documents are current, beneficiary designations are up to date on every retirement / insurance / bank account, healthcare directive and durable power of attorney exist, and contact info for executor / trustee is current. Universal — most adults are out of date here, especially after marriage, divorce, kids, or parent death."
  - slug: wealth-op-investment-review
    name: "Wealth: op-investment-review"
    path: "wealth/skills/op-investment-review/SKILL.md"
    sourceType: local
    description: "Monthly investment performance review. Calculates 30-day and YTD returns for each investment account (401k, Roth IRA, Traditional IRA, HSA invested, brokerage). Checks actual asset allocation vs. target and flags any asset class drifted more than 5 percentage points. Checks 401k contribution pace against the $23,500 2025 IRS limit. Triggers: \"investment review\", \"check my portfolio\", \"am I due for rebalancing\", \"how are my investments doing\", \"portfolio check\"."
  - slug: wealth-op-monthly-synthesis
    name: "Wealth: op-monthly-synthesis"
    path: "wealth/skills/op-monthly-synthesis/SKILL.md"
    sourceType: local
    description: "Full monthly wealth synthesis. Runs after monthly account statements are downloaded (typically the 3rd of the month). Calls net worth review, cash flow review, and investment review in sequence. Produces a consolidated wealth synthesis document and then triggers the wealth review brief. Triggers: \"monthly wealth synthesis\", \"wealth summary\", \"net worth delta\", \"how did my wealth change this month\", \"run the monthly wealth sync\"."
  - slug: wealth-op-net-worth-review
    name: "Wealth: op-net-worth-review"
    path: "wealth/skills/op-net-worth-review/SKILL.md"
    sourceType: local
    description: "Monthly net worth snapshot. Aggregates all asset balances (checking, savings, HYSA, brokerage, 401k, Roth IRA, Traditional IRA, HSA, real estate equity) and subtracts all liabilities (mortgage, auto, student loans, credit cards) to produce net worth with month-over-month delta per line item. Annotates any account that moved more than $5,000 in either direction. Triggers: \"net worth review\", \"monthly wealth check\", \"how is my net worth trending\", \"net worth snapshot\"."
  - slug: wealth-op-review-brief
    name: "Wealth: op-review-brief"
    path: "wealth/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Lightweight current-state snapshot of wealth. Reads the most recent net worth, cash flow, and any active open-loops, returns a 30-second summary. Distinct from op-monthly-synthesis (which is the full monthly process that runs all flows fresh and produces deep briefs). Use this when you want to know \"where do I stand right now\" without re-running anything heavy."
  - slug: wealth-op-subscription-audit
    name: "Wealth: op-subscription-audit"
    path: "wealth/skills/op-subscription-audit/SKILL.md"
    sourceType: local
    description: "Annual recurring-charge review. Lists every detected subscription with monthly cost, last-charged date, last-used signal where available, and a cancel-or-keep recommendation. Reads subscription data from records plugin (if installed) or detects directly from cash-flow transaction stream. Universal — most adults have $50–$500/month of stale subscriptions."
  - slug: wealth-task-extract-account-balance
    name: "Wealth: task-extract-account-balance"
    path: "wealth/skills/task-extract-account-balance/SKILL.md"
    sourceType: local
    description: "Reads a specific account's current balance, prior-period balance, and institution name from vault/wealth/00_current/ and returns the structured record to the calling flow. Called by wealth flows that need a targeted balance lookup without loading the entire accounts directory. Accepts account nickname (e.g., \"Fidelity 401k\") or account type (e.g., \"primary checking\") as lookup key."
  - slug: wealth-task-flag-budget-variance
    name: "Wealth: task-flag-budget-variance"
    path: "wealth/skills/task-flag-budget-variance/SKILL.md"
    sourceType: local
    description: "Writes a flag to vault/wealth/open-loops.md when an expense category exceeds its monthly budget by more than 20%. Each entry includes: category name, actual amount spent, budget target, dollar overage, percent overage, severity tier (MEDIUM 20–50%, HIGH 51–100%, CRITICAL >100%), and a context note for likely one-time overages. Recurring overages (same category flagged 3+ consecutive months) auto-escalate to HIGH."
  - slug: wealth-task-flag-rate-opportunity
    name: "Wealth: task-flag-rate-opportunity"
    path: "wealth/skills/task-flag-rate-opportunity/SKILL.md"
    sourceType: local
    description: "Single rate-opportunity scanner combining cash drag and rate arbitrage. Detects three conditions: (1) liquid balances earning <0.5% APY when 4–5% HYSAs are available (cash drag); (2) mortgage rate >0.75% above current market rates (refi opportunity); (3) revolving credit-card balances when 0% balance-transfer offers exist. Each finding is written as an open-loop entry with quantified annual savings."
  - slug: wealth-task-track-credit-score
    name: "Wealth: task-track-credit-score"
    path: "wealth/skills/task-track-credit-score/SKILL.md"
    sourceType: local
    description: "Logs current credit score from any source (Credit Karma, card issuer, Experian, TransUnion, Equifax, FICO) to a monthly time series. Flags >20-point drops immediately. Scores are kept per bureau because they can differ."
  - slug: wealth-task-update-open-loops
    name: "Wealth: task-update-open-loops"
    path: "wealth/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "The single write point for vault/wealth/open-loops.md. Called at the end of every wealth op. Appends new flags (budget overages, rebalancing alerts, savings milestones, debt events, 401k warnings, unexplained account movements) with timestamp, source op, and severity. Scans existing OPEN entries for items that can be auto-resolved — corrected allocation drift, categories back under budget, debts paid off. Preserves resolved items with resolution date for audit trail."
  - slug: tax-app-irs.portal
    name: "Tax: app-irs.portal"
    path: "tax/skills/app-irs.portal/SKILL.md"
    sourceType: local
    description: "Accesses IRS.gov for account transcripts (payments applied, balance due, prior year tax summary), IRS Direct Pay for estimated tax payments (1040-ES), and notice/letter downloads via Playwright with ID.me authentication. Also accesses EFTPS (Electronic Federal Tax Payment System) for scheduled estimated payments. Used by the tax agent for verifying prior quarterly payments and confirming payment received on the IRS transcript. Requires headless=False (ID.me MFA). Configure ID.me email and Chrome profile in vault/tax/config.md."
  - slug: tax-app-quickbooks
    name: "Tax: app-quickbooks"
    path: "tax/skills/app-quickbooks/SKILL.md"
    sourceType: local
    description: "Pulls Profit & Loss reports, Balance Sheet, and transaction-level expense data from QuickBooks Online via Playwright with Intuit account authentication. Used by the tax agent to identify deductible business expenses by category, extract net business income for self-employment tax calculation, and produce the business income summary for the accountant package. Also used by the business agent for P&L tracking. Configure Intuit email and Chrome profile in vault/tax/config.md."
  - slug: tax-app-turbotax.portal
    name: "Tax: app-turbotax.portal"
    path: "tax/skills/app-turbotax.portal/SKILL.md"
    sourceType: local
    description: "Accesses TurboTax Online for prior year return downloads (PDF), current year filing status, imported W-2 and 1099 data summary, estimated refund or amount owed, and key return metrics (AGI, effective tax rate, total deductions). Used by the tax agent for document sync (downloading completed returns), prior year AGI retrieval for safe harbor calculations, and annual review. Prior year returns are available in TurboTax for 7 years. Configure Intuit credentials and Chrome profile in vault/tax/config.md."
  - slug: tax-flow-build-estimate
    name: "Tax: flow-build-estimate"
    path: "tax/skills/flow-build-estimate/SKILL.md"
    sourceType: local
    description: "Projects the current quarter's estimated federal tax payment by aggregating YTD income across all sources (W-2 wages, 1099-NEC, rental, capital gains, dividends, business income), subtracting YTD withholding and prior estimated payments, and running both the safe harbor method (110% of prior year liability if AGI >$150k) and the actual current-year liability method. Returns the lower of the two as the recommended payment. Includes underpayment penalty risk if no payment is made."
  - slug: tax-flow-document-completeness
    name: "Tax: flow-document-completeness"
    path: "tax/skills/flow-document-completeness/SKILL.md"
    sourceType: local
    description: "Checks the expected tax document checklist for the current tax year against files actually received in vault/tax/00_current/ and flags anything expected but not yet received. Expected documents are determined from active income sources, entities, and investments configured in config.md. Document types: W-2, 1099-NEC, 1099-MISC, 1099-B, 1099-DIV, 1099-INT, 1099-R, K-1, 1098, and entity returns. Enforces consistent file naming convention across all documents."
  - slug: tax-flow-equity-comp-tax-events
    name: "Tax: flow-equity-comp-tax-events"
    path: "tax/skills/flow-equity-comp-tax-events/SKILL.md"
    sourceType: local
    description: "ADVANCED / OPTIONAL — for users with employer equity comp. Models the three equity-comp tax events that catch tech workers off-guard: RSU vest (ordinary income at vest, supplemental withholding often insufficient), ISO exercise (AMT exposure on bargain element), and ESPP qualifying-vs-disqualifying disposition (ordinary income on the discount in disqualifying year). For each event, projects tax owed and flags estimated-payment adjustments."
  - slug: tax-flow-rental-property-summary
    name: "Tax: flow-rental-property-summary"
    path: "tax/skills/flow-rental-property-summary/SKILL.md"
    sourceType: local
    description: "ADVANCED / OPTIONAL — for landlords. Builds the Schedule E aggregator across one or more rental properties: rental income, deductible expenses (mortgage interest, property tax, insurance, repairs, management fees, HOA, utilities), depreciation (27.5-year straight-line for residential), and passive-loss carryforward tracking (current-year passive losses are limited; excess carries forward until disposition or passive income offsets it). Distinguishes repair (deductible now) from improvement (capitalized and depreciated)."
  - slug: tax-flow-review-deductions
    name: "Tax: flow-review-deductions"
    path: "tax/skills/flow-review-deductions/SKILL.md"
    sourceType: local
    description: "Scans transaction records and vault documents in vault/tax/00_current/ for deductible expenses, classifies each against IRS deduction categories (home office simplified or actual method, business expenses, charitable contributions, medical expenses >7.5% AGI, vehicle business use at 70 cents/mile for 2025), verifies documentation reference exists for each item, computes YTD totals per category, and flags categories running more than 20% behind prior year same-period pace."
  - slug: tax-flow-safe-harbor-calc
    name: "Tax: flow-safe-harbor-calc"
    path: "tax/skills/flow-safe-harbor-calc/SKILL.md"
    sourceType: local
    description: "Computes the IRS safe-harbor target for estimated tax payments: 100% of prior-year total federal tax liability (or 110% if prior-year AGI exceeded $150,000), divided by 4 for the per-quarter target. Returns the cumulative target through the current quarter so callers can compute the remaining net payment. Standalone helper called by flow-build-estimate; can also be run user-facing for a quick \"what's my safe harbor?\" answer."
  - slug: tax-flow-tax-loss-harvesting-scan
    name: "Tax: flow-tax-loss-harvesting-scan"
    path: "tax/skills/flow-tax-loss-harvesting-scan/SKILL.md"
    sourceType: local
    description: "ADVANCED / OPTIONAL — for investors with taxable brokerage accounts and meaningful volatility. Reads taxable-account positions (cross-domain with wealth plugin), flags individual lots with >$1,000 unrealized loss, and identifies wash-sale-safe replacement candidates so the user can harvest losses without disqualifying the deduction. Cap of $3,000 net capital loss against ordinary income per year; excess carries forward."
  - slug: tax-op-cpa-packet
    name: "Tax: op-cpa-packet"
    path: "tax/skills/op-cpa-packet/SKILL.md"
    sourceType: local
    description: "Compiles the complete CPA / tax-prep packet by January 31. Aggregates W-2s, 1099s (NEC / MISC / B / DIV / INT / R / K), 1098s (mortgage / tuition / student loan), 1095s (health coverage), K-1s, deduction summary, charitable summary, estimated payment record, prior-year return, and prior-year carryforwards into a single organized folder ready to hand to a CPA or upload to TurboTax. Self-employment (Schedule C), rental (Schedule E), and entity (K-1) sections light up only if configured."
  - slug: tax-op-cpa-touchpoints
    name: "Tax: op-cpa-touchpoints"
    path: "tax/skills/op-cpa-touchpoints/SKILL.md"
    sourceType: local
    description: "Schedules and prepares the four proactive year-round CPA conversations that turn a CPA from a once-a-year preparer into a strategist: Q3 projection (mid-September — are estimates on track?), Q4 year-end planning (early November — confirm Dec 31 moves), filing-season packet handoff (Feb–Apr), post-filing strategy debrief (May — what to change for next year). For each touchpoint, generates a briefing note your CPA can read in 5 minutes."
  - slug: tax-op-deadline-watch
    name: "Tax: op-deadline-watch"
    path: "tax/skills/op-deadline-watch/SKILL.md"
    sourceType: local
    description: "Monthly tax deadline monitor. Flags all federal and state tax obligations due within 30 days, plus a 90-day forward look. Covers quarterly estimated payments (Q1 April 15, Q2 June 15, Q3 Sept 15, Q4 Jan 15), annual return and extension deadlines, and — for users with active LLCs / S-corps — entity-level obligations (annual reports, franchise tax, Form 941, registered agent renewals). Each flag includes amount, payment method, urgency tier, and source reference. Triggers: \"check tax deadlines\", \"upcoming tax dates\", \"what tax is due\", \"tax deadline alert\"."
  - slug: tax-op-deduction-review
    name: "Tax: op-deduction-review"
    path: "tax/skills/op-deduction-review/SKILL.md"
    sourceType: local
    description: "Monthly deduction review. Scans recent transactions and vault receipts for deductible expenses across home office (simplified method $5/sq ft or actual expenses), vehicle business use (70 cents/mile for 2025), business expenses (software, equipment, professional services, meals at 50%), charitable contributions (with documentation check for donations ≥$250), and medical expenses exceeding 7.5% of AGI. Verifies documentation, computes YTD totals per category, and flags categories below prior year pace. Triggers: \"deduction review\", \"log a deductible expense\", \"what can I deduct\", \"are my deductions documented\"."
  - slug: tax-op-document-sync
    name: "Tax: op-document-sync"
    path: "tax/skills/op-document-sync/SKILL.md"
    sourceType: local
    description: "Tax document intake op, active January through April 15. Triggered each time a new tax document arrives (W-2, 1099-NEC, 1099-B, 1099-DIV, 1099-INT, 1099-R, K-1, 1098) via email, mail, or portal download. Logs the document to the vault inventory, updates the completeness checklist, and flags any document expected but not yet received after its issuer deadline (January 31 for W-2s and 1099s; March 15 for K-1s). Triggers: \"tax document arrived\", \"W-2 came in\", \"1099 received\", \"log a tax doc\"."
  - slug: tax-op-entity-compliance
    name: "Tax: op-entity-compliance"
    path: "tax/skills/op-entity-compliance/SKILL.md"
    sourceType: local
    description: "ADVANCED / OPTIONAL — only runs for users with active LLCs / S-corps / partnerships configured in vault/tax/config.md. Skip entirely for W-2-only filers. Quarterly compliance check covering: state annual report filing deadlines and fees, franchise tax payment obligations (e.g., California $800 minimum, Texas margin tax), registered agent renewal status, S-corp reasonable salary and payroll tax deposit requirements (Form 941, EFTPS), K-1 issuance deadlines, and state-specific LLC requirements. Flags all gaps and approaching deadlines within 90 days. Triggers: \"entity compliance check\", \"LLC filing due\", \"business entity compliance\"."
  - slug: tax-op-quarterly-estimate
    name: "Tax: op-quarterly-estimate"
    path: "tax/skills/op-quarterly-estimate/SKILL.md"
    sourceType: local
    description: "Calculates the current quarter's estimated federal tax payment. Aggregates YTD income from all sources, subtracts YTD withholding and prior estimated payments, and runs both the safe harbor method (110% of prior year liability if AGI >$150k) and the actual current-year method. Returns the lower of the two as the recommended payment. Quantifies underpayment penalty risk if no payment is made. Triggers: \"estimated tax\", \"quarterly payment due\", \"what do I owe this quarter\", \"calculate Q1/Q2/Q3/Q4 estimate\", \"safe harbor payment\"."
  - slug: tax-op-review-brief
    name: "Tax: op-review-brief"
    path: "tax/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Monthly tax review brief. Compiles YTD estimated tax liability, total federal and state payments made YTD (withholding + estimated payments), next upcoming deadline with amount, entity compliance status across all active entities, deduction totals by category, and prioritized action items. Designed to be read in 3 minutes. Triggers: \"tax brief\", \"tax status\", \"monthly tax review\", \"am I behind on taxes\", \"tax summary\"."
  - slug: tax-op-year-end-planning-sweep
    name: "Tax: op-year-end-planning-sweep"
    path: "tax/skills/op-year-end-planning-sweep/SKILL.md"
    sourceType: local
    description: "Highest-leverage tax skill of the year. Run on November 1 to surface every Dec 31 optimization opportunity before it expires: 401k / IRA / HSA / FSA contribution status vs limits, charitable bunching opportunities, FSA use-it-or-lose-it, HSA catch-up (age 55+), RMDs (age 73+), Roth conversion windows during low-income years, itemize-vs-standard projection, and any equity-comp moves (sell ESPP, exercise ISOs) that should be timed before year-end."
  - slug: tax-task-extract-income-ytd
    name: "Tax: task-extract-income-ytd"
    path: "tax/skills/task-extract-income-ytd/SKILL.md"
    sourceType: local
    description: "Reads YTD income totals from vault/tax/ across all income source types and returns a structured breakdown for use by estimated tax flows. Income categories: W-2 wages (gross and YTD withholding), 1099-NEC self-employment income, rental income (net of expenses), short-term capital gains, long-term capital gains, qualified dividends, ordinary dividends, interest income, and other income. Also returns total YTD federal withholding and prior quarterly estimated payments."
  - slug: tax-task-flag-1099-issuer-pending
    name: "Tax: task-flag-1099-issuer-pending"
    path: "tax/skills/task-flag-1099-issuer-pending/SKILL.md"
    sourceType: local
    description: "Maintains a registry of every entity expected to issue a 1099 to the user (banks, brokerages, freelance clients, affiliate platforms, gig apps, payment processors, ride-share, etc.). After Feb 15, flags any expected issuer that hasn't sent a 1099 yet. Common cause of incomplete returns and amended-return rework. Each entry records issuer name, expected 1099 type, threshold ($10 for INT/DIV; $600 for NEC/MISC; varies for K), tax year, and received status."
  - slug: tax-task-log-deductible-expense
    name: "Tax: task-log-deductible-expense"
    path: "tax/skills/task-log-deductible-expense/SKILL.md"
    sourceType: local
    description: "Records a deductible expense to vault/tax/00_current/ with all metadata required to support the deduction at filing: date, vendor/payee, amount, deduction category (home office, vehicle/mileage, business expense, charitable, medical), IRS basis for deductibility, supporting document reference, business purpose note (for meals/travel), and tax year. Enforces documentation reference before marking fully documented. Can be called by the deduction review op or triggered directly when a deductible purchase is made in real time."
  - slug: tax-task-track-charitable-giving
    name: "Tax: task-track-charitable-giving"
    path: "tax/skills/task-track-charitable-giving/SKILL.md"
    sourceType: local
    description: "Logs cash and non-cash charitable donations year-round to a single ledger. Flags receipt requirements at IRS thresholds: $250 (written acknowledgment required for cash gifts), $500 (Form 8283 required for non-cash), $5,000 (qualified appraisal required for non-cash). Generates Schedule A summary at year-end. Each entry records: date, organization, amount, type (cash / non-cash / QCD), payment method, receipt status, and tax year."
  - slug: tax-task-track-home-office
    name: "Tax: task-track-home-office"
    path: "tax/skills/task-track-home-office/SKILL.md"
    sourceType: local
    description: "Records home-office documentation month by month for users who claim the deduction: square footage of dedicated office, total home square footage, qualifying-use percentage, method (simplified $5/sq ft up to 300 sq ft, or actual expenses), and monthly direct/indirect expenses (rent or mortgage interest, utilities, insurance, internet, repairs). Continuous documentation makes the deduction supportable in audit; reconstructed logs are weak."
  - slug: tax-task-track-retirement-contribution-limits
    name: "Tax: task-track-retirement-contribution-limits"
    path: "tax/skills/task-track-retirement-contribution-limits/SKILL.md"
    sourceType: local
    description: "Tracks YTD contributions to 401k, Traditional IRA, Roth IRA, HSA, FSA against current-year IRS limits + age-based catch-ups. Flags days remaining to max and the cash-flow impact of catching up. 2025 limits: 401k $23,500 ($31,000 if 50+); IRA $7,000 ($8,000 if 50+); HSA $4,300 individual / $8,550 family ($1,000 catch-up if 55+); health FSA $3,300; dependent-care FSA $5,000. Used by op-year-end-planning-sweep for max-contribution gap analysis."
  - slug: tax-task-track-state-residency
    name: "Tax: task-track-state-residency"
    path: "tax/skills/task-track-state-residency/SKILL.md"
    sourceType: local
    description: "ADVANCED / OPTIONAL — for multistate workers, snowbirds, recent movers, and remote workers in border states. Logs days-per-state to substantiate residency or non-residency at filing. Most states use a 183-day threshold (sometimes 184) plus a domicile test. Some no-income-tax states (FL, TX, WA, NV, TN, SD, WY, AK, NH) attract aggressive residency challenges from prior high-tax states (e.g., NY, CA). Flags as user approaches state-specific thresholds."
  - slug: tax-task-update-open-loops
    name: "Tax: task-update-open-loops"
    path: "tax/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "The single write point for vault/tax/open-loops.md. Called at the end of every tax op. Appends new flags (approaching deadlines, missing documents, deduction gaps, entity compliance issues, estimated payment recommendations, documentation pending) with timestamp, source op, severity, and due date. Scans existing OPEN entries for items that can be auto-resolved — paid deadlines, received documents, completed filings. Preserves resolved items with resolution date for audit trail."
  - slug: career-app-greenhouse.api
    name: "Career: app-greenhouse.api"
    path: "career/skills/app-greenhouse.api/SKILL.md"
    sourceType: local
    description: "Tracks job application status, interview stages, offer details, and recruiter contacts from employer Greenhouse ATS candidate portals via Playwright. Used by career-agent for pipeline management, stage updates, and interview scheduling. Each employer has their own Greenhouse subdomain or custom URL. Configure target company portal URL in vault/career/config.md."
  - slug: career-app-levels-fyi.portal
    name: "Career: app-levels-fyi.portal"
    path: "career/skills/app-levels-fyi.portal/SKILL.md"
    sourceType: local
    description: "Scrapes compensation data by company, role, and level from Levels.fyi — the most accurate source for tech compensation benchmarking. Provides P25/P50/P75/P90 breakdowns for total comp, base, bonus, and equity separately. Also provides level ladder comparisons and job postings with reported compensation. No authentication required. Configure target role, companies, and location in vault/career/config.md."
  - slug: career-app-linkedin.portal
    name: "Career: app-linkedin.portal"
    path: "career/skills/app-linkedin.portal/SKILL.md"
    sourceType: local
    description: "Accesses LinkedIn for job market scanning, compensation research, professional network review, and recruiter message monitoring via Playwright with Chrome cookie session. Requires headless=False. Max 50 job results per search session to avoid rate limiting. Configure profile URL and Chrome profile path in vault/career/config.md."
  - slug: career-flow-build-comp-summary
    name: "Career: flow-build-comp-summary"
    path: "career/skills/flow-build-comp-summary/SKILL.md"
    sourceType: local
    description: "Builds a total compensation comparison table showing your current TC broken down by component (base, bonus, equity, benefits) versus market P25/P50/P75 for your role, level, and location. Pulls live benchmark data from Levels.fyi, Glassdoor, and LinkedIn Salary. Returns structured table to calling op."
  - slug: career-flow-build-forward-skills-plan
    name: "Career: flow-build-forward-skills-plan"
    path: "career/skills/flow-build-forward-skills-plan/SKILL.md"
    sourceType: local
    description: "Synthesizes an 18-24 month forward skills plan from horizon-scan signals and target-role trajectories. Distinct from flow-build-skills-gap-summary, which compares the current skill set to today's job descriptions. This flow projects which skills will be in demand 18-24 months out and recommends 2-3 high-conviction bets, with rationale and learning resources."
  - slug: career-flow-build-skills-gap-summary
    name: "Career: flow-build-skills-gap-summary"
    path: "career/skills/flow-build-skills-gap-summary/SKILL.md"
    sourceType: local
    description: "Compares the current skills inventory (with proficiency levels and recency) to target role requirements aggregated from recent market scan data. Identifies gaps, scores each by market demand frequency and time to close, and returns a ranked list of the top 3-5 priority gaps with specific learning resource recommendations."
  - slug: career-flow-negotiation-prep
    name: "Career: flow-negotiation-prep"
    path: "career/skills/flow-negotiation-prep/SKILL.md"
    sourceType: local
    description: "Compiles a moment-of-decision negotiation packet: BATNA (other live options + market comp benchmarks), leverage points (recent achievements, market signals, hard-to-replace skills), target range and walk-away number, and counter-language for common objections. Distinct from passive comp benchmarking — this fires when an offer is on the table or a comp conversation is scheduled."
  - slug: career-flow-review-pipeline
    name: "Career: flow-review-pipeline"
    path: "career/skills/flow-review-pipeline/SKILL.md"
    sourceType: local
    description: "Reviews the active application pipeline for staleness and stall signals. Flags applications with no response in 7+ business days, opportunities at the same stage for 14+ days, and watch-list items that have closed. Produces a status report with prioritized follow-up actions for each flagged item."
  - slug: career-flow-scan-target-roles
    name: "Career: flow-scan-target-roles"
    path: "career/skills/flow-scan-target-roles/SKILL.md"
    sourceType: local
    description: "Data-collection flow only. Searches LinkedIn Jobs, Glassdoor, and Levels.fyi for open roles matching configured target criteria, filters by title / comp floor / remote / company tier, extracts compensation ranges and required skills, and returns a ranked list plus market statistics. Does not write briefs, does not log to pipeline, does not send notifications — all routing belongs to the calling op (op-market-scan or op-weekly-market-pulse)."
  - slug: career-op-comp-review
    name: "Career: op-comp-review"
    path: "career/skills/op-comp-review/SKILL.md"
    sourceType: local
    description: "Quarterly total comp benchmarking vs. market P25/P50/P75 for your role, level, and location. Reads your full TC breakdown from vault, pulls live market data from Levels.fyi, Glassdoor, and LinkedIn Salary, identifies your percentile position, and flags comp gaps with a tiered action plan. Triggers: \"comp review\", \"am I paid fairly\", \"check my salary\", \"salary benchmark\", \"how does my pay compare\", \"total comp analysis\"."
  - slug: career-op-interview-prep
    name: "Career: op-interview-prep"
    path: "career/skills/op-interview-prep/SKILL.md"
    sourceType: local
    description: "Given a target company + role, compiles a one-stop interview prep packet: company snapshot (recent news, earnings or funding posture, leadership, strategy signals), role-specific JD analysis, prepared questions to ask, and a behavioral-question bank pre-populated with the user's STAR examples drawn from achievements log. Triggers: \"interview prep\", \"prep for interview at\", \"I have an interview\", \"compile interview brief\"."
  - slug: career-op-market-scan
    name: "Career: op-market-scan"
    path: "career/skills/op-market-scan/SKILL.md"
    sourceType: local
    description: "Monthly job market scan searching for open roles matching your target criteria: role titles, company tier, tech stack, compensation minimums, and remote policy. Summarizes market health, identifies standout opportunities, logs qualifying roles to the watch pipeline, and tracks market signal trends over time. Triggers: \"market scan\", \"what jobs are out there\", \"check the job market\", \"job search\", \"what's hiring\", \"open roles for my level\"."
  - slug: career-op-network-review
    name: "Career: op-network-review"
    path: "career/skills/op-network-review/SKILL.md"
    sourceType: local
    description: "Monthly professional network health check. Reviews relationship recency across strategic contacts, identifies warm reconnects (60-90 day dormant relationships), surfaces new connections worth pursuing at target companies, and drafts personalized outreach messages ready for the user to send. Triggers: \"network review\", \"who should I reach out to\", \"networking check\", \"keep my network warm\", \"professional connections\", \"outreach drafts\"."
  - slug: career-op-performance-review-prep
    name: "Career: op-performance-review-prep"
    path: "career/skills/op-performance-review-prep/SKILL.md"
    sourceType: local
    description: "Pulls every captured achievement from the review period, drafts a self-evaluation narrative organized by company-stated review competencies (or sensible defaults if none configured), and flags which accomplishments belong on the resume + LinkedIn. Replaces blank-page paralysis the day the form opens. Triggers: \"performance review prep\", \"self-eval\", \"review packet\", \"my self-review is due\", \"draft my self-evaluation\"."
  - slug: career-op-promotion-campaign
    name: "Career: op-promotion-campaign"
    path: "career/skills/op-promotion-campaign/SKILL.md"
    sourceType: local
    description: "When the user is going for promotion: tracks the visibility log (where you've been seen by leadership and skip-levels), sponsor list (named senior advocates and current relationship state), stretch-projects-in-flight, and the decision timeline. Runs monthly during a promotion cycle; idle otherwise. Triggers: \"promotion campaign\", \"going for promo\", \"promotion check-in\", \"track my promo case\"."
  - slug: career-op-review-brief
    name: "Career: op-review-brief"
    path: "career/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Monthly career review brief — the single user-facing monthly entry point. Refreshes pay-stub data, pipeline freshness, recruiter touches, and document organization, then synthesizes market position, comp vs. market summary, skills-gap priorities, and 3-5 next actions into a dated brief. Replaces the prior split between op-monthly-sync (data refresh) and op-review-brief (synthesis). Triggers: \"career brief\", \"career review\", \"career status\", \"how is my career\", \"career update\", \"monthly career report\", \"monthly career sync\", \"sync career data\"."
  - slug: career-op-skills-gap-review
    name: "Career: op-skills-gap-review"
    path: "career/skills/op-skills-gap-review/SKILL.md"
    sourceType: local
    description: "Quarterly skills gap analysis comparing your current skills inventory to target role requirements scraped from the monthly market scan. Ranks the top 3-5 gaps by market demand frequency and estimated time to reach working proficiency. Produces a prioritized learning list with specific platform and course recommendations. Triggers: \"skills gap review\", \"what should I be learning\", \"career development check\", \"skills analysis\", \"learning priorities for my career\", \"skills for my next job\"."
  - slug: career-op-weekly-market-pulse
    name: "Career: op-weekly-market-pulse"
    path: "career/skills/op-weekly-market-pulse/SKILL.md"
    sourceType: local
    description: "Lightweight weekly scan distinct from the heavier monthly op-market-scan. Checks the recruiter inbox for new threads, scans target-company career pages and LinkedIn for newly posted roles matching tight criteria, and surfaces 0-5 high-signal items per week. Closes the weekly market cadence benchmark. Triggers: \"weekly market pulse\", \"what's new this week\", \"any new roles\", \"weekly career check\"."
  - slug: career-task-capture-achievement
    name: "Career: task-capture-achievement"
    path: "career/skills/task-capture-achievement/SKILL.md"
    sourceType: local
    description: "Logs a dated professional achievement (shipped project, recognition, metric delivered, role expansion, talk given, certification earned) to the achievement log and flags resume + LinkedIn for refresh if either has not been updated within 2 weeks of the new entry. Closes the \"resume and LinkedIn updated within 2 weeks of any meaningful achievement\" benchmark."
  - slug: career-task-draft-outreach-message
    name: "Career: task-draft-outreach-message"
    path: "career/skills/task-draft-outreach-message/SKILL.md"
    sourceType: local
    description: "Drafts a personalized professional outreach message for a specific contact, tailored to the context type (warm reconnect, referral request, networking maintenance, or intro request). Reads the contact's record from vault, incorporates specific details, and produces a 3-4 sentence message ready for the user to review and send via LinkedIn or email."
  - slug: career-task-export-comp-to-wealth
    name: "Career: task-export-comp-to-wealth"
    path: "career/skills/task-export-comp-to-wealth/SKILL.md"
    sourceType: local
    description: "Writes the user's current total compensation breakdown and YTD income summary to a stable handoff file consumed by the wealth and benefits plugins. Closes the cross-agent feed non-negotiable: career data must flow into wealth (income, savings rate, runway) and benefits (401k pacing, HSA pacing, employer-match capture)."
  - slug: career-task-flag-comp-gap
    name: "Career: task-flag-comp-gap"
    path: "career/skills/task-flag-comp-gap/SKILL.md"
    sourceType: local
    description: "Writes a structured compensation gap flag to vault/career/open-loops.md when current TC falls below market P50 for role, level, and metro. Includes current TC, market P50, dollar gap, gap percentage, severity tier, benchmark sources, and a tiered action plan (negotiate at review / passive market engagement / active exploration)."
  - slug: career-task-flag-stale-contact
    name: "Career: task-flag-stale-contact"
    path: "career/skills/task-flag-stale-contact/SKILL.md"
    sourceType: local
    description: "Scans the contacts file for any warm contact whose last_contact_date is older than 90 days and writes a stale-contact flag to open-loops with a suggested next action. Closes the \"no warm contact older than 90 days\" benchmark. Called by op-network-review and runnable on demand."
  - slug: career-task-log-application
    name: "Career: task-log-application"
    path: "career/skills/task-log-application/SKILL.md"
    sourceType: local
    description: "Records a new job application (or pre-application watch item) to vault/career/00_current/ with full context: company, role, date, source, contact, comp range, tech stack, work arrangement, fit notes, and default follow-up window. Sets a 7-business-day follow-up reminder. Triggers: \"log application\", \"add to pipeline\", \"track this application\", \"I applied to\", \"add this job to my tracker\"."
  - slug: career-task-log-recruiter-touch
    name: "Career: task-log-recruiter-touch"
    path: "career/skills/task-log-recruiter-touch/SKILL.md"
    sourceType: local
    description: "Light CRM for recruiter relationships: who reached out, what role and company, when, comp range mentioned, response sent, follow-up status, and whether it's worth keeping warm. Turns an unmanaged inbox of recruiter pings into a structured pipeline. Most professionals get recruiter touches monthly; without logging, every touch is reinvented."
  - slug: career-task-parse-pay-stub
    name: "Career: task-parse-pay-stub"
    path: "career/skills/task-parse-pay-stub/SKILL.md"
    sourceType: local
    description: "Extracts gross pay, net pay, federal/state withholding, FICA, pre-tax deductions (401k, HSA, FSA, health/dental/vision premiums), post-tax deductions, employer-paid benefits, and YTD totals from a single pay stub PDF or screenshot from any payroll provider. Appends a structured entry to the monthly pay-stub log and flags anomalies vs. the prior stub."
  - slug: career-task-snapshot-resume-linkedin
    name: "Career: task-snapshot-resume-linkedin"
    path: "career/skills/task-snapshot-resume-linkedin/SKILL.md"
    sourceType: local
    description: "Versioned snapshot of resume + LinkedIn profile copied to 01_prior/snapshots/{YYYY-MM-DD}/. Lets the user diff over time, recover a prior version after a bad edit, and review how the story has evolved across years. Runs after major edits and on a quarterly cadence regardless."
  - slug: career-task-track-license-cert-renewal
    name: "Career: task-track-license-cert-renewal"
    path: "career/skills/task-track-license-cert-renewal/SKILL.md"
    sourceType: local
    description: "Tracks professional licenses (PE, CPA, RN, MD, JD, bar admission, etc.), industry certifications (AWS, GCP, Azure, PMP, CISSP, CFA, SHRM, etc.), and continuing-education credits. Logs renewal deadlines, required CEU hours and completion progress, and surfaces any renewal coming up in the next 90/60/30 days. Skipped entirely for users without any licensed/certified credentials."
  - slug: career-task-update-open-loops
    name: "Career: task-update-open-loops"
    path: "career/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Maintains vault/career/open-loops.md as the canonical list of outstanding career action items. Appends new flags from any career op run (comp gaps, follow-up reminders, stalled pipeline alerts, skills development priorities, outreach deadlines). Resolves and removes items that are no longer applicable. Called at the end of every career op."
  - slug: career-task-update-reference-list
    name: "Career: task-update-reference-list"
    path: "career/skills/task-update-reference-list/SKILL.md"
    sourceType: local
    description: "Maintains a list of professional references: who, role at the time of relationship, last contact date, willingness-to-vouch status, role-fit notes, and contact info. Surfaces references going stale before a job search begins so the first ask isn't from a cold reach-out. References are a long-tail discipline — most users wait until they need them, which is too late."
  - slug: calendar-app-gcalendar
    name: "Calendar: app-gcalendar"
    path: "calendar/skills/app-gcalendar/SKILL.md"
    sourceType: local
    description: "Manual fallback for users without a native Google Calendar MCP connector (e.g., Codex CLI users, or installs where the native connector is disabled). When Claude Desktop's native Google Calendar connector is available, all calendar skills should prefer that path and use this app skill only on degrade. Reads and creates calendar events via the Google Calendar API: weekly agenda generation, focus time block analysis, multi-calendar event aggregation, and deadline event creation. Supports multiple calendars (personal, work, family/shared, plus any additional calendars the user configures). Configure OAuth credentials and calendar IDs in vault/calendar/config.md."
  - slug: calendar-app-notion
    name: "Calendar: app-notion"
    path: "calendar/skills/app-notion/SKILL.md"
    sourceType: local
    description: "Manual fallback for users without a native Notion MCP connector (e.g., Codex CLI users, or installs where the native connector is disabled). When Claude Desktop's native Notion connector is available, calendar skills should prefer that path and use this app skill only on degrade. Reads and writes Notion pages and databases via the Notion API to publish weekly agendas and deadline tracking tables for cross-device access. Optional — all calendar data lives locally in vault/calendar/ first; Notion is a display and sharing layer. Configure integration token and page IDs in vault/calendar/config.md."
  - slug: calendar-flow-analyze-focus-time
    name: "Calendar: flow-analyze-focus-time"
    path: "calendar/skills/flow-analyze-focus-time/SKILL.md"
    sourceType: local
    description: "Analyzes the ratio of meetings vs. unblocked focus time across the past week and upcoming week, comparing against a 10-hour focus goal and identifying which days have the best and worst deep work conditions."
  - slug: calendar-flow-build-agenda
    name: "Calendar: flow-build-agenda"
    path: "calendar/skills/flow-build-agenda/SKILL.md"
    sourceType: local
    description: "Builds a week-ahead agenda combining cross-domain deadlines, calendar events, and priority open loops — then suggests 2-3 focus blocks for deep work items."
  - slug: calendar-flow-collect-deadlines
    name: "Calendar: flow-collect-deadlines"
    path: "calendar/skills/flow-collect-deadlines/SKILL.md"
    sourceType: local
    description: "Scans all installed plugin open-loops.md files and extracts items with explicit due dates within the next 60 days, sorted chronologically with urgent items (due within 7 days) flagged separately."
  - slug: calendar-flow-energy-aware-scheduling
    name: "Calendar: flow-energy-aware-scheduling"
    path: "calendar/skills/flow-energy-aware-scheduling/SKILL.md"
    sourceType: local
    description: "v2. Suggests scheduling deep work at the user's high-energy times based on a configured chronotype + a self-reported energy log. Used by `flow-build-agenda` to choose which 90+ min free block to assign to deep work. Skips gracefully if chronotype unset."
  - slug: calendar-flow-protect-recurring-blocks
    name: "Calendar: flow-protect-recurring-blocks"
    path: "calendar/skills/flow-protect-recurring-blocks/SKILL.md"
    sourceType: local
    description: "Reads recurring-block configuration (deep work, family, workout, health, focus blocks) and writes consistently-named recurring protected events to the user's primary calendar via `task-create-confirmed-event`. Enforces naming convention so downstream agents can detect and respect protected blocks. Called by `op-weekly-agenda` and `op-quarterly-time-design-rebalance`."
  - slug: calendar-op-conflict-scan
    name: "Calendar: op-conflict-scan"
    path: "calendar/skills/op-conflict-scan/SKILL.md"
    sourceType: local
    description: "Cross-calendar double-booking and protected-block-violation detector. Scans every calendar configured in `config.md` (personal + work + any family/shared/secondary) for time-window overlaps, then checks whether any meeting overlaps a configured protected block. Reports conflicts with severity tier and proposed resolution. Triggers: \"conflict scan\", \"double bookings\", \"calendar conflicts\", \"scheduling conflicts\"."
  - slug: calendar-op-daily-brief
    name: "Calendar: op-daily-brief"
    path: "calendar/skills/op-daily-brief/SKILL.md"
    sourceType: local
    description: "10-minute start-of-day briefing across all configured calendars. Surfaces today's events, meeting-prep status for >30 min meetings, urgent deadlines (≤7 days), today's protected blocks, and the day's first commitment. Daily op designed to replace `op-deadline-alert`'s ≤7-day surface as the morning anchor. Triggers: \"daily brief\", \"morning brief\", \"today's plan\", \"what's today\"."
  - slug: calendar-op-deadline-planning
    name: "Calendar: op-deadline-planning"
    path: "calendar/skills/op-deadline-planning/SKILL.md"
    sourceType: local
    description: "On-demand deadline planner; given a deadline date and task scope, works backward from the due date to create a preparation schedule with milestones, effort estimates, and calendar placement recommendations. Triggers: \"plan deadline\", \"work backward from deadline\", \"deadline prep\"."
  - slug: calendar-op-focus-time-review
    name: "Calendar: op-focus-time-review"
    path: "calendar/skills/op-focus-time-review/SKILL.md"
    sourceType: local
    description: "Weekly focus time audit; analyzes meeting load vs. deep work blocks across the current and upcoming week, flags weeks falling below 8 hours of uninterrupted focus time, and recommends specific calendar changes to protect deep work. Triggers: \"focus review\", \"meeting overload\", \"deep work time\", \"calendar audit\"."
  - slug: calendar-op-holiday-observance-sync
    name: "Calendar: op-holiday-observance-sync"
    path: "calendar/skills/op-holiday-observance-sync/SKILL.md"
    sourceType: local
    description: "Pulls federal + user-configured cultural/religious holidays for the current calendar year and writes them as protected all-day events on the configured calendar. Honors per-user observance lists (some users observe Christian holidays, some Jewish, Muslim, Hindu, etc.; some observe none). Idempotent — re-running for the same year reconciles rather than duplicating. Triggers: \"sync holidays\", \"holiday calendar\", \"add observances\"."
  - slug: calendar-op-quarterly-time-design-rebalance
    name: "Calendar: op-quarterly-time-design-rebalance"
    path: "calendar/skills/op-quarterly-time-design-rebalance/SKILL.md"
    sourceType: local
    description: "Big quarterly retrospective + redesign. Distinct from monthly `op-time-allocation-review` (which is reactive). This op asks: was last quarter's calendar a fair representation of the user's stated priorities, and what should change next quarter? Reconfigures protected blocks in `config.md` and re-runs `flow-protect-recurring-blocks` with the new design."
  - slug: calendar-op-recurring-event-audit
    name: "Calendar: op-recurring-event-audit"
    path: "calendar/skills/op-recurring-event-audit/SKILL.md"
    sourceType: local
    description: "Quarterly recurring-event hygiene audit. Identifies \"zombie\" recurring events — meetings no one attends, recurring blocks that are stale, or series that have outgrown their purpose. Recurring events compound forever without periodic pruning. Triggers: \"recurring event audit\", \"calendar hygiene\", \"zombie meetings\"."
  - slug: calendar-op-time-allocation-review
    name: "Calendar: op-time-allocation-review"
    path: "calendar/skills/op-time-allocation-review/SKILL.md"
    sourceType: local
    description: "Monthly retrospective. Sums hours actually allocated across configured life domains (health, family, creative, business, admin, etc.) from completed events on every configured calendar, then compares against paragon balance targets. Flags imbalances and feeds the next month's `flow-protect-recurring-blocks` cycle. Triggers: \"time allocation\", \"where did my time go\", \"monthly time review\"."
  - slug: calendar-op-weekly-agenda
    name: "Calendar: op-weekly-agenda"
    path: "calendar/skills/op-weekly-agenda/SKILL.md"
    sourceType: local
    description: "Monday morning weekly agenda builder; collects all cross-domain deadlines and priorities for the coming week, then suggests focus time blocks based on urgency and effort. Triggers: \"weekly agenda\", \"what's this week\", \"week ahead\", \"monday preview\"."
  - slug: calendar-task-add-deadline
    name: "Calendar: task-add-deadline"
    path: "calendar/skills/task-add-deadline/SKILL.md"
    sourceType: local
    description: "Records a new deadline to vault/calendar/00_current/ with item description, due date, domain, effort estimate, priority, and linked open loop. Called whenever a new deadline is identified during any op run or directly on-demand."
  - slug: calendar-task-add-meeting-prep
    name: "Calendar: task-add-meeting-prep"
    path: "calendar/skills/task-add-meeting-prep/SKILL.md"
    sourceType: local
    description: "Given an event ID (or event reference), drafts an agenda + context block by pulling from related domain vaults (career, business, wealth, health, etc.) and writes it to the event description. Enforces the paragon's rule that every meeting >30 min has an agenda. Called by `op-daily-brief` for any flagged unprepped meeting; can also be user-triggered."
  - slug: calendar-task-add-travel-buffer
    name: "Calendar: task-add-travel-buffer"
    path: "calendar/skills/task-add-travel-buffer/SKILL.md"
    sourceType: local
    description: "Adds buffer events around a trip: drive/transit time to airport, arrival buffer at destination, and a configurable jet-lag recovery block on return. Reads trip details (origin, destination, flight times, mode) and produces 2–4 calendar events routed through `task-create-confirmed-event`."
  - slug: calendar-task-block-after-travel-recovery
    name: "Calendar: task-block-after-travel-recovery"
    path: "calendar/skills/task-block-after-travel-recovery/SKILL.md"
    sourceType: local
    description: "v2. Auto-blocks the day (or half-day) after long-haul flights or back-to-back travel weeks for catch-up. Frequent travelers only. Called by `task-add-travel-buffer` when the trip exceeds the configured recovery threshold; can also be user-triggered for a specific date."
  - slug: calendar-task-create-confirmed-event
    name: "Calendar: task-create-confirmed-event"
    path: "calendar/skills/task-create-confirmed-event/SKILL.md"
    sourceType: local
    description: "Single write-point wrapper for every agent-initiated calendar create or update. Drafts the payload, presents it to the user for explicit approval, and only then writes via the native MCP calendar connector (preferred) or `app-gcalendar` (fallback). Enforces the paragon's rule that agent-added events are confirmed before creation, and applies the standard naming convention so downstream skills can detect agent-authored events."
  - slug: calendar-task-decline-template
    name: "Calendar: task-decline-template"
    path: "calendar/skills/task-decline-template/SKILL.md"
    sourceType: local
    description: "Pre-built \"no\" responses + reschedule proposals for common meeting-request patterns. Reduces friction in protecting time. Given a meeting request (or detected protected-block conflict), drafts a polite decline or counter-propose-time response in the user's voice, ready to send. Never auto-sends."
  - slug: calendar-task-import-birthdays-from-social
    name: "Calendar: task-import-birthdays-from-social"
    path: "calendar/skills/task-import-birthdays-from-social/SKILL.md"
    sourceType: local
    description: "Reads the social plugin's contacts roster, extracts birthdays, and writes recurring all-day birthday events with configurable lead-time reminders. Cross-plugin convenience that turns the social vault into calendar surface area. Idempotent — re-running reconciles instead of duplicating. Skips silently if social plugin not installed."
  - slug: calendar-task-track-pto-ooo
    name: "Calendar: task-track-pto-ooo"
    path: "calendar/skills/task-track-pto-ooo/SKILL.md"
    sourceType: local
    description: "Tracks PTO / sick / OOO balance against configurable accrual rules. Reads OOO events from the work calendar, sums consumed days, compares to balance, surfaces calendar events that conflict with available PTO, and flags use-it-or-lose-it deadlines for plans with caps. Universal for W-2 employees; degrades gracefully for contractors/self-employed (skips silently)."
  - slug: calendar-task-update-open-loops
    name: "Calendar: task-update-open-loops"
    path: "calendar/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Writes calendar flags (upcoming deadline clusters, focus time deficits, unscheduled high-priority items) to vault/calendar/open-loops.md and resolves completed items."
  - slug: explore-app-airbnb.portal
    name: "Explore: app-airbnb.portal"
    path: "explore/skills/app-airbnb.portal/SKILL.md"
    sourceType: local
    description: "Scrapes Airbnb for property listings, availability, and pricing for target destinations and date ranges via Playwright. Used by explore-agent for accommodation research during trip planning — comparing options before committing to a booking. Must use headless=False. Configure in vault/explore/config.md."
  - slug: explore-app-google-flights
    name: "Explore: app-google-flights"
    path: "explore/skills/app-google-flights/SKILL.md"
    sourceType: local
    description: "Scrapes flight prices, route options, and price calendar data from Google Flights via Playwright. Used by explore-agent for trip planning, fare comparison, and identifying the cheapest travel days for wishlist destinations. No authentication required — all data is public. Must use headless=False for full calendar rendering."
  - slug: explore-app-trip-it
    name: "Explore: app-trip-it"
    path: "explore/skills/app-trip-it/SKILL.md"
    sourceType: local
    description: "Reads unified trip itineraries from TripIt for travel tracking and confirmation aggregation. Used by explore-agent for monthly travel sync — pulling confirmed booking details (flight numbers, hotel confirmation numbers, check-in times) from TripIt into the explore vault rather than requiring the user to manually re-enter confirmation details."
  - slug: explore-flow-build-trip-summary
    name: "Explore: flow-build-trip-summary"
    path: "explore/skills/flow-build-trip-summary/SKILL.md"
    sourceType: local
    description: "Generates a trip brief for an upcoming trip covering destination, dates, lodging, transport, total budget, and open booking items."
  - slug: explore-flow-check-travel-docs
    name: "Explore: flow-check-travel-docs"
    path: "explore/skills/flow-check-travel-docs/SKILL.md"
    sourceType: local
    description: "Verifies all travel documents are valid for upcoming trips, including the 6-month passport validity rule and vaccination requirements for wishlist destinations."
  - slug: explore-flow-cotraveler-coordination
    name: "Explore: flow-cotraveler-coordination"
    path: "explore/skills/flow-cotraveler-coordination/SKILL.md"
    sourceType: local
    description: "For group trips: maintains a shared coordination doc (itinerary, expense splits, activity votes) and surfaces the next coordination action. Optional, only runs when a trip is flagged as group (v2)."
  - slug: explore-flow-suggest-next-outing
    name: "Explore: flow-suggest-next-outing"
    path: "explore/skills/flow-suggest-next-outing/SKILL.md"
    sourceType: local
    description: "Suggests the next outing given pace deficit (vs. activity goal), weather window, season, and unvisited wishlist items. Configurable scope: solo, partner, family-friendly, or any user-defined companion mode."
  - slug: explore-flow-trip-pattern-analysis
    name: "Explore: flow-trip-pattern-analysis"
    path: "explore/skills/flow-trip-pattern-analysis/SKILL.md"
    sourceType: local
    description: "Annual: reads logged trips and outings, surfaces patterns (preferred trip types, average trip length, time-of-year preferences, partner/solo split, cost per trip). Informs next year's planning."
  - slug: explore-op-activity-goal-review
    name: "Explore: op-activity-goal-review"
    path: "explore/skills/op-activity-goal-review/SKILL.md"
    sourceType: local
    description: "Weekly review of the user's configurable annual activity goal. Reads outing log, computes pace vs. target, flags shortfall, and surfaces next-outing candidates from the wishlist. Goal type and target are user-configurable (any activity, any count)."
  - slug: explore-op-document-check
    name: "Explore: op-document-check"
    path: "explore/skills/op-document-check/SKILL.md"
    sourceType: local
    description: "Quarterly travel document audit that checks passport, Global Entry, TSA PreCheck, and vaccination records for expiration within 12 months. Triggers: \"document check\", \"passport check\", \"travel documents\", \"Global Entry renewal\"."
  - slug: explore-op-monthly-sync
    name: "Explore: op-monthly-sync"
    path: "explore/skills/op-monthly-sync/SKILL.md"
    sourceType: local
    description: "Monthly explore sync. Checks all travel document expiration dates and surfaces upcoming trips requiring preparation. Triggers: \"explore monthly sync\", \"sync travel documents\", \"check passport\"."
  - slug: explore-op-review-brief
    name: "Explore: op-review-brief"
    path: "explore/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Monthly explore review brief. Compiles upcoming trips, travel document expiration alerts, and wishlist status into a single briefing doc. Triggers: \"explore brief\", \"travel review\", \"trip status\", \"passport check\"."
  - slug: explore-op-trip-planning-review
    name: "Explore: op-trip-planning-review"
    path: "explore/skills/op-trip-planning-review/SKILL.md"
    sourceType: local
    description: "On-demand trip planning review that checks visa requirements, passport validity, travel insurance, vaccinations, and key booking deadlines for an upcoming trip. Triggers: \"trip planning\", \"travel prep\", \"plan my trip\", \"travel checklist\"."
  - slug: explore-task-add-to-wishlist
    name: "Explore: task-add-to-wishlist"
    path: "explore/skills/task-add-to-wishlist/SKILL.md"
    sourceType: local
    description: "Adds a destination, trail, restaurant, or experience to a structured wishlist that flow-suggest-next-outing and trip planning read from. Tags by scope (solo / partner / family / group) and activity type so suggestions stay relevant."
  - slug: explore-task-check-entry-requirements
    name: "Explore: task-check-entry-requirements"
    path: "explore/skills/task-check-entry-requirements/SKILL.md"
    sourceType: local
    description: "For international trips: checks visa requirements, passport blank-page count, electronic travel authorizations (eTA, ESTA, ETIAS, K-ETA), and vaccination requirements for the destination country and the user's citizenship. Reads destination from task-log-trip."
  - slug: explore-task-evaluate-travel-insurance
    name: "Explore: task-evaluate-travel-insurance"
    path: "explore/skills/task-evaluate-travel-insurance/SKILL.md"
    sourceType: local
    description: "Per-trip travel-insurance evaluation: worth it or not, given trip cost, destination risk, trip type, age, pre-existing conditions, and existing credit-card / employer / annual-policy coverage. Optional per trip (v2)."
  - slug: explore-task-log-experience-reflection
    name: "Explore: task-log-experience-reflection"
    path: "explore/skills/task-log-experience-reflection/SKILL.md"
    sourceType: local
    description: "Lightweight post-experience reflection (highlight, what to remember, what to do differently). Single canonical schema used by both task-log-outing and the post-trip path of task-log-trip."
  - slug: explore-task-log-outing
    name: "Explore: task-log-outing"
    path: "explore/skills/task-log-outing/SKILL.md"
    sourceType: local
    description: "Records an outdoor activity or local adventure (hike, run, bike ride, walk, visit, paddle, ski, climb, anything) to vault/explore/00_current/outings/{YYYY-MM-DD-slug}.md with type, date, location, distance/duration, conditions, companions, notes, and reflection. One log schema handles all outing types — type is set per entry."
  - slug: explore-task-log-trip
    name: "Explore: task-log-trip"
    path: "explore/skills/task-log-trip/SKILL.md"
    sourceType: local
    description: "Records a new trip to vault/explore/00_current/ with destination, dates, purpose, total budget, booking status, and companions."
  - slug: explore-task-pretrip-packing-checklist
    name: "Explore: task-pretrip-packing-checklist"
    path: "explore/skills/task-pretrip-packing-checklist/SKILL.md"
    sourceType: local
    description: "Generates a packing checklist for a specific trip from trip type (domestic / international / outdoor / business / mixed), destination weather, duration, activity plan, and current gear inventory. Configurable per trip."
  - slug: explore-task-track-loyalty-status
    name: "Explore: task-track-loyalty-status"
    path: "explore/skills/task-track-loyalty-status/SKILL.md"
    sourceType: local
    description: "Tracks airline, hotel, rental car, and credit-card travel-loyalty programs: current tier, miles/points balance, status-renewal date, and expiring miles. Most adults have 2-3 programs and lose value to expiry — this surfaces it in time."
  - slug: explore-task-track-travel-budget
    name: "Explore: task-track-travel-budget"
    path: "explore/skills/task-track-travel-budget/SKILL.md"
    sourceType: local
    description: "Tracks per-trip budget vs. actual spend across categories (flights, lodging, food, activities, ground transport, insurance, other). Cross-domain with wealth — total trip cost feeds cash-flow review."
  - slug: explore-task-update-gear-inventory
    name: "Explore: task-update-gear-inventory"
    path: "explore/skills/task-update-gear-inventory/SKILL.md"
    sourceType: local
    description: "Maintains a gear inventory (travel + outdoor) at vault/explore/00_current/gear.md with item, category, condition, last-used date, and replacement flags. Pre-trip prep and packing checklists read from it."
  - slug: explore-task-update-open-loops
    name: "Explore: task-update-open-loops"
    path: "explore/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Writes all explore flags (expiring documents, unbooked trip items, budget overruns, gear replacement, loyalty expiry, entry-requirement gaps) to vault/explore/open-loops.md and resolves completed items. This is the single canonical writer; document-expiration logic was merged in from the former task-flag-expiring-document."
  - slug: home-app-angi
    name: "Home: app-angi"
    path: "home/skills/app-angi/SKILL.md"
    sourceType: local
    description: "Searches contractor listings, ratings, license status, and cost guides on Angi (formerly Angie's List) via Playwright. Used by home-agent for finding and vetting service professionals for maintenance tasks. Configure location and Chrome profile in vault/home/config.md."
  - slug: home-app-thumbtack
    name: "Home: app-thumbtack"
    path: "home/skills/app-thumbtack/SKILL.md"
    sourceType: local
    description: "Searches local professional listings and quote requests on Thumbtack via Playwright. Used by home-agent for finding contractors and obtaining competitive quotes on home maintenance and improvement projects. Complements Angi for multi-source quote comparison. Configure location and Chrome profile in vault/home/config.md."
  - slug: home-flow-build-cleaning-routine
    name: "Home: flow-build-cleaning-routine"
    path: "home/skills/flow-build-cleaning-routine/SKILL.md"
    sourceType: local
    description: "Generates the recurring household-cleaning task schedule (daily / weekly / monthly / quarterly / annual) calibrated to household composition (solo / couple / family / with pets) and surfaces today's tasks. Configurable: assign tasks to household members, mark which tasks the user outsources to a cleaner. Universal — renters and homeowners."
  - slug: home-flow-build-expense-summary
    name: "Home: flow-build-expense-summary"
    path: "home/skills/flow-build-expense-summary/SKILL.md"
    sourceType: local
    description: "Summarizes monthly home expenses by category (utilities, repairs, supplies, services) vs. prior month and YTD budget. Flags categories more than 20% over budget. Trends utility bills against same month prior year to catch rate increases and seasonal anomalies."
  - slug: home-flow-build-maintenance-schedule
    name: "Home: flow-build-maintenance-schedule"
    path: "home/skills/flow-build-maintenance-schedule/SKILL.md"
    sourceType: local
    description: "Generates the complete seasonal maintenance checklist for the current season: task name, frequency, last-done date, next-due date, urgency, assigned vendor, and estimated cost. Checks completion records against the seasonal calendar and flags overdue or due-this-season tasks."
  - slug: home-op-emergency-prep-review
    name: "Home: op-emergency-prep-review"
    path: "home/skills/op-emergency-prep-review/SKILL.md"
    sourceType: local
    description: "Semi-annual emergency-preparedness checklist: first aid, water, food, batteries, flashlights, smoke / CO detector battery dates, fire extinguisher charge dates, emergency contact list, evacuation plan. Flags expirations and missing items as open loops. Universal — applies to renters and homeowners."
  - slug: home-op-expense-review
    name: "Home: op-expense-review"
    path: "home/skills/op-expense-review/SKILL.md"
    sourceType: local
    description: "Monthly home expense review. Tracks utilities, repairs, supplies, and services vs. monthly budget. Flags categories 20%+ over budget, trends utilities YoY to catch rate increases, and tracks repair costs by system to signal approaching replacement thresholds. Triggers: \"home expenses\", \"utility review\", \"repair costs\", \"home budget\", \"what did I spend on the house\"."
  - slug: home-op-hoa-tracking
    name: "Home: op-hoa-tracking"
    path: "home/skills/op-hoa-tracking/SKILL.md"
    sourceType: local
    description: "OWNER-ONLY. Tracks HOA dues, special assessments, meeting calendar, voting items, and rule changes. Auto-skips if home_type is \"rent\" or hoa_active is false. Surfaces upcoming meetings, unpaid dues, and any rule change that affects the user (rentals, exterior modifications, pets, parking)."
  - slug: home-op-home-improvement-project-log
    name: "Home: op-home-improvement-project-log"
    path: "home/skills/op-home-improvement-project-log/SKILL.md"
    sourceType: local
    description: "OWNER-ONLY. Tracks renovation / upgrade projects: planned vs. actual cost, contractor + license + warranty, before / after photos, permits filed, change orders, and project status (planning / quoting / in-progress / complete / warranty-active). Closes the cost-basis gap that pays off years later when the home is sold (capital improvements adjust basis). Auto-skips if home_type is \"rent\"."
  - slug: home-op-home-office-audit
    name: "Home: op-home-office-audit"
    path: "home/skills/op-home-office-audit/SKILL.md"
    sourceType: local
    description: "Reviews the home office for chronic friction: lighting, cable management, hardware reliability, ergonomics, network reliability, acoustic environment. Produces a prioritized issue list and feeds each item to task-flag-maintenance-item so it enters the standard maintenance queue. Universal — works whether the user owns or rents and whether they work from home full-time, hybrid, or occasionally."
  - slug: home-op-lease-renewal-review
    name: "Home: op-lease-renewal-review"
    path: "home/skills/op-lease-renewal-review/SKILL.md"
    sourceType: local
    description: "RENTER-ONLY. Triggered automatically by op-monthly-sync when lease_end_date is within 60 days, or on-demand. Pulls the current lease, looks up market rent for the user's metro / zip via configured source (Zillow Rentals, Rentometer, Apartments.com), drafts a renewal-vs-move decision brief: rent comparison, moving cost estimate, break-even months, walk-away criteria. Auto-skips if home_type is \"own\"."
  - slug: home-op-meal-grocery-plan
    name: "Home: op-meal-grocery-plan"
    path: "home/skills/op-meal-grocery-plan/SKILL.md"
    sourceType: local
    description: "Generates a weekly meal plan and grocery list aligned to the household's nutrition goals and weekly schedule. Reads health-plugin nutrition targets if available (calories, macros, dietary restrictions), reads the week's calendar from calendar-plugin if available (which nights are eat-at-home vs. eat-out), and produces a 7-day meal plan plus a categorized grocery list. Universal — works for solo, couple, or family."
  - slug: home-op-monthly-sync
    name: "Home: op-monthly-sync"
    path: "home/skills/op-monthly-sync/SKILL.md"
    sourceType: local
    description: "Full monthly home sync on the 1st of each month. Updates open maintenance item statuses, reviews monthly home expenses, checks seasonal task completion, flags upcoming lease or insurance renewals, and triggers the home review brief. Triggers: \"home monthly sync\", \"sync home data\", \"monthly home review\"."
  - slug: home-op-monthly-synthesis
    name: "Home: op-monthly-synthesis"
    path: "home/skills/op-monthly-synthesis/SKILL.md"
    sourceType: local
    description: "Full monthly home synthesis. Runs every flow fresh, produces deep monthly brief, hands monthly home expenses to wealth-agent (cross-domain handoff), updates open-loops, and rolls prior month's records to 01_prior/. Mirrors the monthly synthesis pattern used by every other domain plugin. Universal."
  - slug: home-op-move-planning
    name: "Home: op-move-planning"
    path: "home/skills/op-move-planning/SKILL.md"
    sourceType: local
    description: "Active-move planner. Triggered when a move is logged (move_in_progress=true in config or user says \"I'm moving\"). Generates timed checklists at 8 / 4 / 2 / 1 weeks before move-day, and a move-day-of + first-week checklist. Covers address changes, utility transfers, mover quotes, packing schedule, lease / closing tasks, insurance updates. Universal — works for renter→renter, renter→owner, owner→renter, owner→owner."
  - slug: home-op-organize-documents
    name: "Home: op-organize-documents"
    path: "home/skills/op-organize-documents/SKILL.md"
    sourceType: local
    description: "Indexes home documents (lease, insurance policy, warranties, appliance manuals, HOA docs, utility account info, contractor invoices) from the vault and from Gmail attachments into a single searchable index. Surfaces missing categories so retrieval takes <2 minutes. Works for renters and homeowners — owner-only categories (mortgage docs, deed, HOA bylaws) auto-skip when home_type is \"rent\"."
  - slug: home-op-pet-care-review
    name: "Home: op-pet-care-review"
    path: "home/skills/op-pet-care-review/SKILL.md"
    sourceType: local
    description: "Reviews pet care for households with pets: vet appointments due (annual exam, vaccinations, dental), medication refills, food / litter / supply inventory, and exercise log. Auto-skips if pet_count is 0. Universal for pet households — works for dogs, cats, and other companion animals."
  - slug: home-op-review-brief
    name: "Home: op-review-brief"
    path: "home/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Home review brief — produced weekly when maintenance items are flagged or seasonal tasks are due, or on-demand. Compiles open maintenance items, seasonal tasks due within 14 days, current month home expenses, renewal alerts, and home value tracking. Supports a weekly \"silent unless flagged\" mode (parameter mode=weekly): in that mode, exits silently when no overdue items, no tasks due within 7 days, and no stale vendor follow-ups. Triggers: \"home brief\", \"home review\", \"maintenance check\", \"home status\", \"what's due at home\", \"weekly home review\", \"home check this week\"."
  - slug: home-op-seasonal-maintenance
    name: "Home: op-seasonal-maintenance"
    path: "home/skills/op-seasonal-maintenance/SKILL.md"
    sourceType: local
    description: "Quarterly seasonal maintenance planner. Generates the seasonal checklist for the upcoming season (spring/summer/fall/winter), computes what's overdue vs. due, assigns vendors, and estimates total seasonal maintenance cost. Triggers: \"seasonal maintenance\", \"home maintenance\", \"maintenance checklist\", \"spring maintenance\", \"fall maintenance\"."
  - slug: home-task-flag-maintenance-item
    name: "Home: task-flag-maintenance-item"
    path: "home/skills/task-flag-maintenance-item/SKILL.md"
    sourceType: local
    description: "Writes a maintenance flag to open-loops.md and creates a maintenance item record in vault/home/00_current/. Captures task description, location, urgency, last-serviced date, vendor, estimated cost, and target completion date. Used for both reactive repairs and proactive scheduled maintenance."
  - slug: home-task-log-expense
    name: "Home: task-log-expense"
    path: "home/skills/task-log-expense/SKILL.md"
    sourceType: local
    description: "Records a home expense to vault/home/00_current/ with date, category (utilities/repairs/ supplies/services), subcategory, vendor, amount, notes, and receipt reference. Category tagging feeds directly into monthly budget variance calculations."
  - slug: home-task-track-mortgage
    name: "Home: task-track-mortgage"
    path: "home/skills/task-track-mortgage/SKILL.md"
    sourceType: local
    description: "OWNER-ONLY. Logs monthly mortgage payment, splits principal vs. interest vs. escrow, updates outstanding balance and equity, and flags refinance opportunity when current rate drops 0.75%+ below loan rate (configurable). Computes recast vs. refi math when user has lump sum to apply. Auto-skips if home_type is \"rent\"."
  - slug: home-task-track-property-tax
    name: "Home: task-track-property-tax"
    path: "home/skills/task-track-property-tax/SKILL.md"
    sourceType: local
    description: "OWNER-ONLY. Logs annual property-tax assessment + payment schedule (typically semi-annual or quarterly depending on jurisdiction). Surfaces appeal-deadline awareness when assessment increases >assessment_increase_threshold_pct YoY (default 10%) — most jurisdictions have a 30–90 day appeal window. Auto-skips if home_type is \"rent\"."
  - slug: home-task-track-utility-usage
    name: "Home: task-track-utility-usage"
    path: "home/skills/task-track-utility-usage/SKILL.md"
    sourceType: local
    description: "Logs monthly utility-bill data (electric, gas, water, internet, trash) with usage units (kWh, therms, gallons, Mbps) and amount paid. Computes month-over-month and year-over-year deltas; flags usage spikes >25% YoY for the same month. Reads from Gmail bill emails when Gmail connector is available. Universal — renters and homeowners."
  - slug: home-task-update-home-inventory
    name: "Home: task-update-home-inventory"
    path: "home/skills/task-update-home-inventory/SKILL.md"
    sourceType: local
    description: "Annual photo / video walkthrough of household contents for insurance claim purposes. Records each room's contents, high-value items with serial numbers + receipts + appraisals, and stores the inventory file in vault. Most renters and homeowners are underinsured because they've never inventoried — this fixes that. Universal."
  - slug: home-task-update-open-loops
    name: "Home: task-update-open-loops"
    path: "home/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Writes all home flags (overdue maintenance, budget overruns, expiring warranties, renewal deadlines) to open-loops.md and resolves completed items. Maintains the home domain's canonical action list readable by calendar and morning brief routing."
  - slug: insurance-app-insurance-portal.portal
    name: "Insurance: app-insurance-portal.portal"
    path: "insurance/skills/app-insurance-portal.portal/SKILL.md"
    sourceType: local
    description: "Accesses policy documents, coverage details, premium amounts, renewal dates, and claim status from any personal insurance carrier's online portal via Playwright with Chrome cookie session. Used by insurance-agent for coverage audits, renewal date verification, and claims status checking. Requires headless=False. Configure carrier portal URLs in vault/insurance/config.md."
  - slug: insurance-app-policygenius
    name: "Insurance: app-policygenius"
    path: "insurance/skills/app-policygenius/SKILL.md"
    sourceType: local
    description: "Accesses insurance comparison quotes for term life, disability income, and umbrella liability policies on PolicyGenius. Used by insurance-agent during annual coverage audits to compare existing coverage against current market rates and identify shopping opportunities. No authentication required for most quote flows. Configure coverage targets in vault/insurance/config.md."
  - slug: insurance-flow-build-coverage-summary
    name: "Insurance: flow-build-coverage-summary"
    path: "insurance/skills/flow-build-coverage-summary/SKILL.md"
    sourceType: local
    description: "Compiles a full coverage matrix from all active insurance policies: carrier, policy type, coverage limits (per-occurrence and aggregate), deductible, annual premium, and renewal date. Checks the assembled coverage set against the expected minimum baseline and flags any missing policy types. Returns the matrix and missing-policy flags to the calling op."
  - slug: insurance-flow-deductible-progress-snapshot
    name: "Insurance: flow-deductible-progress-snapshot"
    path: "insurance/skills/flow-deductible-progress-snapshot/SKILL.md"
    sourceType: local
    description: "YTD progress against the health deductible and out-of-pocket max plus auto deductible status. Cross-domain with health (where EOB reconciliation lives) but lives in insurance because the answer informs decisions like \"should I delay this elective procedure to next plan year.\" Returns a snapshot of where each deductible stands and the projected end-of-year position."
  - slug: insurance-flow-sync-policy-docs
    name: "Insurance: flow-sync-policy-docs"
    path: "insurance/skills/flow-sync-policy-docs/SKILL.md"
    sourceType: local
    description: "Iterates the user's configured carriers, calls `app-insurance-portal.portal` to log in and download the latest declarations PDF for each policy, then routes each PDF through `task-extract-policy-terms` to produce a normalized policy record. Handles the common case where some policies are portal-fetchable and others must be manually uploaded — manual uploads are first-class, not a fallback."
  - slug: insurance-op-claims-review
    name: "Insurance: op-claims-review"
    path: "insurance/skills/op-claims-review/SKILL.md"
    sourceType: local
    description: "On-demand claims management covering the full claim lifecycle: initial filing steps with documentation checklist, active claim status tracking with adjuster follow-up actions, settlement offer adequacy review, stall detection (claims open 30+ days without status update), and denial appeal guidance. Triggers: \"claim status\", \"insurance claim\", \"file a claim\", \"claims review\", \"I need to file a claim\", \"my claim was denied\"."
  - slug: insurance-op-coverage-audit
    name: "Insurance: op-coverage-audit"
    path: "insurance/skills/op-coverage-audit/SKILL.md"
    sourceType: local
    description: "Annual comprehensive insurance portfolio audit comparing all coverage limits to current assets, income, and liabilities. Applies 10-12x income life insurance adequacy rule, 60-70% income disability replacement check, net-worth vs. liability + umbrella gap analysis, and property replacement cost verification. Flags gaps by severity (minor/moderate/significant) with estimated premium impact. Triggers: \"coverage audit\", \"insurance audit\", \"am I underinsured\", \"coverage gaps\", \"insurance review\", \"full coverage check\"."
  - slug: insurance-op-document-claims-process
    name: "Insurance: op-document-claims-process"
    path: "insurance/skills/op-document-claims-process/SKILL.md"
    sourceType: local
    description: "For each active policy category, generates a one-page claims runbook the user can hit the moment something happens. Each runbook includes carrier claim phone, claim portal URL, doc checklist, deadline to file, what to say (and not say), and what comes next. The point is that you should not be reading your policy for the first time at the scene of an accident."
  - slug: insurance-op-life-event-coverage-trigger
    name: "Insurance: op-life-event-coverage-trigger"
    path: "insurance/skills/op-life-event-coverage-trigger/SKILL.md"
    sourceType: local
    description: "Watches for life events that should trigger an insurance coverage review: marriage, divorce, baby, home purchase, mortgage payoff, job change, retirement, death of a named insured. When detected (manual flag, vault signal, or cross-domain hint), surfaces the specific coverage adjustments to consider per policy line."
  - slug: insurance-op-long-term-care-evaluation
    name: "Insurance: op-long-term-care-evaluation"
    path: "insurance/skills/op-long-term-care-evaluation/SKILL.md"
    sourceType: local
    description: "Long-term care insurance vs self-funding evaluation. Frames the choice as a math problem: probability-weighted expected LTC need vs the cost of standalone LTC insurance vs hybrid life-LTC products vs the alternative of self-funding from invested assets. Skipped if the user is under 50 or has not opted into the op."
  - slug: insurance-op-medicare-planning
    name: "Insurance: op-medicare-planning"
    path: "insurance/skills/op-medicare-planning/SKILL.md"
    sourceType: local
    description: "Medicare planning support for users approaching or in Medicare eligibility. Walks through Part A/B/C/D decisions, Medigap supplement vs Medicare Advantage, IRMAA awareness based on prior-year MAGI, and enrollment-window timing (Initial Enrollment Period, General Enrollment, Special Enrollment, Annual Election Period). Skipped if the user is under 55 or has not opted into the op."
  - slug: insurance-op-open-enrollment-readiness
    name: "Insurance: op-open-enrollment-readiness"
    path: "insurance/skills/op-open-enrollment-readiness/SKILL.md"
    sourceType: local
    description: "Annual employer-benefits enrollment readiness. Pulls prior-year health utilization, current expected events (planned procedures, family changes, prescription patterns), and runs a comparison across the user's available employer plan options (typically PPO vs HDHP+HSA vs HMO). Outputs a recommended plan plus the FSA/HSA contribution targets to set during enrollment. Universal for W-2 employees."
  - slug: insurance-op-property-coverage-sync
    name: "Insurance: op-property-coverage-sync"
    path: "insurance/skills/op-property-coverage-sync/SKILL.md"
    sourceType: local
    description: "For users who own a home or rental property: pulls a current replacement-cost estimate (Zillow/Redfin/manual entry), compares to dwelling coverage on the homeowners or landlord policy, flags coinsurance risk if dwelling coverage falls below 80% of replacement cost. Reruns annually or when a major renovation is logged. Auto-skipped for renters (`scope: renter` in config)."
  - slug: insurance-op-renewal-watch
    name: "Insurance: op-renewal-watch"
    path: "insurance/skills/op-renewal-watch/SKILL.md"
    sourceType: local
    description: "Monthly renewal watch scanning all policy renewal dates and flagging anything renewing within 60 days. Categorizes each renewal as shop (get competing quotes), auto-renew (no action needed), or coverage-review (limits need reassessment before renewal). Generates specific action steps and action-by dates 30 days before renewal. Triggers: \"insurance renewals\", \"policy renewals\", \"renewal check\", \"insurance due\", \"upcoming renewals\", \"renewal dates\"."
  - slug: insurance-op-review-brief
    name: "Insurance: op-review-brief"
    path: "insurance/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Monthly insurance brief compiling all active policy premiums and renewal dates, policies renewing within 60 days with recommended action, active claims status, total annual premium spend, and top coverage gaps from the most recent audit. Formatted as a concise brief with action items sorted by urgency. Triggers: \"insurance brief\", \"insurance review\", \"policy review\", \"coverage check\", \"insurance status\", \"insurance update\"."
  - slug: insurance-op-shop-property-and-auto
    name: "Insurance: op-shop-property-and-auto"
    path: "insurance/skills/op-shop-property-and-auto/SKILL.md"
    sourceType: local
    description: "Triggered when `op-renewal-watch` flags a property or auto policy as \"shop\", or when the user asks to shop coverage. Compiles current coverage parameters into a single apples-to-apples quote sheet, then walks the user through gathering quotes from 3-4 carriers. PolicyGenius covers life/disability/umbrella only — auto and property shopping requires direct carrier contact, so this op is the structured equivalent."
  - slug: insurance-task-evaluate-umbrella-coverage
    name: "Insurance: task-evaluate-umbrella-coverage"
    path: "insurance/skills/task-evaluate-umbrella-coverage/SKILL.md"
    sourceType: local
    description: "Umbrella policy adequacy check for users with significant net worth or assets at risk (homeowners, landlords, high-income earners, parents of teen drivers, owners of pools/dogs/boats/ATVs). Compares net worth and exposure profile to the combined underlying liability + umbrella limit, recommends a target umbrella amount, and estimates premium. Advanced/optional — primarily for users above the basic-audit threshold in `op-coverage-audit`."
  - slug: insurance-task-extract-policy-terms
    name: "Insurance: task-extract-policy-terms"
    path: "insurance/skills/task-extract-policy-terms/SKILL.md"
    sourceType: local
    description: "Reads a policy PDF (declarations page or full contract) and produces a plain-language one-page summary: carrier, policy number, coverage type, effective and renewal dates, premium, deductible, out-of-pocket max, coverage limits, named insureds, key exclusions, and the claims contact line. Normalizes carrier-specific jargon into consistent vault fields so other skills can read it."
  - slug: insurance-task-flag-coverage-gap
    name: "Insurance: task-flag-coverage-gap"
    path: "insurance/skills/task-flag-coverage-gap/SKILL.md"
    sourceType: local
    description: "Writes a structured coverage gap flag to vault/insurance/open-loops.md with coverage type, current limit, recommended limit, financial exposure of the gap (in dollars), severity rating (minor/moderate/significant), estimated annual premium to close, and specific recommended action. Called by coverage-audit for each identified gap."
  - slug: insurance-task-review-beneficiaries
    name: "Insurance: task-review-beneficiaries"
    path: "insurance/skills/task-review-beneficiaries/SKILL.md"
    sourceType: local
    description: "Annual sweep of every insurance policy and financial account that names a beneficiary: life policies, disability riders with beneficiary clauses, retirement accounts (401k, IRA, Roth), HSAs, brokerage TOD/POD, bank POD, 529s. Surfaces stale designations from before marriage, divorce, child birth, or parent death. High-leverage low-effort."
  - slug: insurance-task-sync-to-cross-agents
    name: "Insurance: task-sync-to-cross-agents"
    path: "insurance/skills/task-sync-to-cross-agents/SKILL.md"
    sourceType: local
    description: "After a coverage audit or policy sync, propagates the current insurance carrier and plan details into the vaults of dependent domains: health vault gets the current health carrier, plan name, deductible, OOP max; home vault gets the current homeowners or renters carrier and dwelling/personal property limits; real-estate vault (if present) gets landlord policies per property; wealth vault gets life and disability face values for net-worth and estate calculations."
  - slug: insurance-task-track-claim-status
    name: "Insurance: task-track-claim-status"
    path: "insurance/skills/task-track-claim-status/SKILL.md"
    sourceType: local
    description: "After a claim is filed: tracks claim number, carrier, policy, incident date, filing date, current status, adjuster contact, expected resolution timeline, document requests, and follow-up dates. Surfaces stalled claims (no status update in 30+ days) and looming response deadlines. Each claim is a record in vault/insurance/00_current/claims/ that the user updates as status changes."
  - slug: insurance-task-update-open-loops
    name: "Insurance: task-update-open-loops"
    path: "insurance/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Maintains vault/insurance/open-loops.md as the canonical list of outstanding insurance action items. Appends new flags from any insurance op (renewals, coverage gaps, active claims, missing policies). Resolves completed items with resolution notes. Archives resolved items to open-loops-archive.md. Called at the end of every insurance op."
  - slug: learning-app-coursera
    name: "Learning: app-coursera"
    path: "learning/skills/app-coursera/SKILL.md"
    sourceType: local
    description: "Tracks enrolled course progress, completion percentages, certificate status, and upcoming assignment deadlines on Coursera via Playwright with Chrome cookie session. Used by learning-agent for monthly progress sync and the weekly learning brief. Requires headless=False. Configure Coursera email and Chrome profile in vault/learning/config.md."
  - slug: learning-app-kindle
    name: "Learning: app-kindle"
    path: "learning/skills/app-kindle/SKILL.md"
    sourceType: local
    description: "Accesses Kindle reading progress and highlights via Amazon's Manage Content page or Goodreads RSS sync. Used by learning-agent for reading list tracking and book progress reporting in the weekly learning brief. Two sync methods: Goodreads RSS for currently-reading shelf, or Amazon Kindle Content page for library overview. Configure sync method in vault/learning/config.md."
  - slug: learning-flow-build-learning-summary
    name: "Learning: flow-build-learning-summary"
    path: "learning/skills/flow-build-learning-summary/SKILL.md"
    sourceType: local
    description: "Single learning summary flow. Replaces the previous split between `flow-build-progress-summary` (courses / certs) and `flow-build-reading-summary` (books). Reading is just one item type; pace math is identical across types. Reads all active learning items, computes pace, and returns one urgency-ranked table plus a per-type rollup."
  - slug: learning-flow-build-streak-summary
    name: "Learning: flow-build-streak-summary"
    path: "learning/skills/flow-build-streak-summary/SKILL.md"
    sourceType: local
    description: "Computes daily/weekly study consistency from the study log: current streak, longest streak, days-skipped pattern, weekday-vs-weekend split. Behavioral data about habits — distinct from pace data about pace. Called by review briefs."
  - slug: learning-flow-language-learning-progress
    name: "Learning: flow-language-learning-progress"
    path: "learning/skills/flow-language-learning-progress/SKILL.md"
    sourceType: local
    description: "v2 — only relevant for users learning a language. Computes vocabulary count, app streak (Duolingo, Anki, Pimsleur, Babbel, etc.), CEFR self-eval, and practice-hours-by-skill (reading / listening / speaking / writing). Skipped cleanly when no language is configured."
  - slug: learning-flow-scan-emerging-sources
    name: "Learning: flow-scan-emerging-sources"
    path: "learning/skills/flow-scan-emerging-sources/SKILL.md"
    sourceType: local
    description: "Pulls from user-configured sources (arxiv, industry blogs, newsletters, podcast feeds, model release notes, conference proceedings — whatever fits the field) and ranks 5–10 emerging topics relevant to the user's themes and skill gaps. Field-agnostic — finance, medicine, software, design, law all configure their own source list."
  - slug: learning-op-goal-review
    name: "Learning: op-goal-review"
    path: "learning/skills/op-goal-review/SKILL.md"
    sourceType: local
    description: "Quarterly learning goal alignment review evaluating whether the active learning portfolio is pointed at career and life vision priorities for the next quarter. Adds goals driven by career skills gap data, removes or deprioritizes goals that are no longer strategically relevant, and produces an updated quarterly learning plan with priority rankings. Triggers: \"learning goals review\", \"quarterly learning\", \"skills update\", \"certifications review\", \"am I learning the right things\", \"update my learning plan\"."
  - slug: learning-op-monthly-reflection
    name: "Learning: op-monthly-reflection"
    path: "learning/skills/op-monthly-reflection/SKILL.md"
    sourceType: local
    description: "Monthly reflection brief — distinct from pace review. Captures what was learned, what changed in capability or thinking, what blocked progress, and what's next. Closes the gap where pace metrics were tracked but qualitative learning was never written down."
  - slug: learning-op-monthly-sync
    name: "Learning: op-monthly-sync"
    path: "learning/skills/op-monthly-sync/SKILL.md"
    sourceType: local
    description: "Full learning monthly process on the 1st of each month. Refreshes course progress from configured platforms, updates reading list and current-book status, recalculates certification exam timelines, runs unified pace review (absorbs the old `op-progress-review`), evaluates monthly goal vs. actual, and tops with a learning brief. Triggers: \"learning monthly sync\", \"sync learning data\", \"refresh learning vault\", \"monthly learning review\", \"learning progress review\", \"am I on track with learning\"."
  - slug: learning-op-monthly-theme-set
    name: "Learning: op-monthly-theme-set"
    path: "learning/skills/op-monthly-theme-set/SKILL.md"
    sourceType: local
    description: "Monthly (1st of month) theme-setting op. Pulls career skill gaps and any user-configured priorities, then outputs one named theme with a chosen resource, a planned applied output, a deadline, and weekly milestones. Closes the \"no monthly intent\" gap that was leaving the learning portfolio reactive."
  - slug: learning-op-review-brief
    name: "Learning: op-review-brief"
    path: "learning/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Weekly learning brief compiling active course progress with pace status, current book chapter and reading pace vs. annual goal, certification exam countdown and readiness percentage, weekly study hours logged, and 1-3 specific learning actions for the coming week. Produced every Monday. Triggers: \"learning brief\", \"learning review\", \"how is my learning\", \"study update\", \"learning status\", \"course update\"."
  - slug: learning-task-capture-note
    name: "Learning: task-capture-note"
    path: "learning/skills/task-capture-note/SKILL.md"
    sourceType: local
    description: "Atomic note capture into the vault (or to the user's note system if Obsidian / Notion native connection is set). Tags by theme + source. Replaces the \"I'll remember this\" failure mode that loses 80% of learning the moment the session ends."
  - slug: learning-task-flag-falling-behind
    name: "Learning: task-flag-falling-behind"
    path: "learning/skills/task-flag-falling-behind/SKILL.md"
    sourceType: local
    description: "Writes a behind-pace flag to vault/learning/open-loops.md when a learning item's completion percentage is more than 15 percentage points behind the time-elapsed percentage. Flag includes item title, type, platform, completion percentage, time-elapsed percentage, pace deficit, remaining content, days remaining, required daily pace to recover, and a decision prompt (accelerate / adjust deadline / drop)."
  - slug: learning-task-link-learning-to-domain
    name: "Learning: task-link-learning-to-domain"
    path: "learning/skills/task-link-learning-to-domain/SKILL.md"
    sourceType: local
    description: "Tags a learning item with which life domain it serves (career, hobby, parenting, finance, health, civic, social, home, vision) and writes a one-line note to that domain's `vault/{domain}/` of how the learning will apply. Closes cross-domain application. Generic — no specific career field assumed."
  - slug: learning-task-log-applied-output
    name: "Learning: task-log-applied-output"
    path: "learning/skills/task-log-applied-output/SKILL.md"
    sourceType: local
    description: "Records the artifact that proves a learned skill was actually applied: a URL or path to a project, blog post, repo, certification, talk, deck, or notebook. Generic — works whether the user creates content for a living or applies skills in their day job only. Closes the \"learn-without-shipping\" gap."
  - slug: learning-task-log-completion
    name: "Learning: task-log-completion"
    path: "learning/skills/task-log-completion/SKILL.md"
    sourceType: local
    description: "Records a completed course, certification, or book to vault/learning/01_prior/ with full context: title, type, platform, completion date, estimated hours invested, 1-3 key takeaways in plain language (Feynman-style), personal rating (1-5), and any credential earned with ID or URL. Moves the item from active vault to archive. Triggers: \"log completion\", \"I finished\", \"mark as complete\", \"I passed my exam\", \"I finished reading\", \"course complete\"."
  - slug: learning-task-log-conference-workshop
    name: "Learning: task-log-conference-workshop"
    path: "learning/skills/task-log-conference-workshop/SKILL.md"
    sourceType: local
    description: "Logs a conference / workshop / talk / meetup attendance: event, dates, sessions, takeaways, contacts made, follow-up actions. Cross-pollinates with the social domain via `task-link-learning-to-domain` (target_domain=social) when contacts are recorded."
  - slug: learning-task-mentor-mentee-log
    name: "Learning: task-mentor-mentee-log"
    path: "learning/skills/task-mentor-mentee-log/SKILL.md"
    sourceType: local
    description: "v2 — only relevant for users in formal mentor / mentee relationships. Logs meeting cadence, topics discussed, action items, and reciprocity check. Cross-domain with social. Skipped cleanly when no relationships configured."
  - slug: learning-task-track-learning-budget
    name: "Learning: task-track-learning-budget"
    path: "learning/skills/task-track-learning-budget/SKILL.md"
    sourceType: local
    description: "Tracks any learning budget the user configures — employer stipend, personal annual budget, tuition reimbursement, or none. Logs spend by category, computes remaining balance, and flags unspent funds 90 / 30 days before fiscal-year or anniversary expiry. Users with no budget skip this skill entirely."
  - slug: learning-task-update-open-loops
    name: "Learning: task-update-open-loops"
    path: "learning/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Maintains vault/learning/open-loops.md as the canonical list of outstanding learning action items. Appends new flags from learning ops and flows (courses falling behind, certification exam prep timeline risks, expiring certifications, learning goal misalignment). Resolves and removes items when the underlying issue is addressed. Called by learning ops and flows."
  - slug: learning-task-update-reading-list
    name: "Learning: task-update-reading-list"
    path: "learning/skills/task-update-reading-list/SKILL.md"
    sourceType: local
    description: "Maintains a single structured reading queue (books, articles, papers) with priority, status, expected time, and source. Replaces ad-hoc Goodreads / Pocket / saved-tabs / open-browser-tab sprawl. One canonical list, one place to prioritize."
  - slug: records-app-1password
    name: "Records: app-1password"
    path: "records/skills/app-1password/SKILL.md"
    sourceType: local
    description: "Accesses the 1Password vault via the local CLI (`op`) using a service account token. Used by records-agent to audit document metadata stored in secure notes, check expiry dates on ID items, and log newly obtained documents. Read-only access is preferred; configure service account token in vault/records/config.md."
  - slug: records-app-gdrive
    name: "Records: app-gdrive"
    path: "records/skills/app-gdrive/SKILL.md"
    sourceType: local
    description: "Fallback for users without Claude Desktop's native Google Drive connector. Reads and writes document scans and records files to configured Google Drive folders via the Drive API when the native connector is unavailable (other clients, headless / API-only contexts, write- automation workflows). Prefer the native connector when present; fall back to this skill for OAuth + folder-ID API access. Configure credentials and folder IDs in vault/records/config.md."
  - slug: records-flow-check-expiring-documents
    name: "Records: flow-check-expiring-documents"
    path: "records/skills/flow-check-expiring-documents/SKILL.md"
    sourceType: local
    description: "Scans all identity and legal documents for expiration dates within 12 months. Applies document-specific renewal lead times (passport: 10–13 weeks; Global Entry: start 6 months early; driver's license: 1–2 weeks). Flags legal documents not reviewed in 3+ years. Returns structured action items with renewal steps and agency links."
  - slug: records-flow-renewal-calendar
    name: "Records: flow-renewal-calendar"
    path: "records/skills/flow-renewal-calendar/SKILL.md"
    sourceType: local
    description: "Cross-category renewal dashboard. Aggregates upcoming renewal dates from records (driver's license, REAL ID, passport, vehicle registration, professional license, professional cert, vehicle inspection, HOA dues) and from cross-domain manifests (insurance, subscriptions) into a single timeline sorted by date."
  - slug: records-flow-share-paths-with-agents
    name: "Records: flow-share-paths-with-agents"
    path: "records/skills/flow-share-paths-with-agents/SKILL.md"
    sourceType: local
    description: "Emits per-domain document manifests (tax-docs.json, health-docs.json, insurance-docs.json, career-docs.json, etc.) under 02_briefs/manifests/ that other domain agents read to find the canonical path of any document they depend on. Closes the paragon non-negotiable \"cross-agent accessibility.\""
  - slug: records-op-digital-legacy-plan
    name: "Records: op-digital-legacy-plan"
    path: "records/skills/op-digital-legacy-plan/SKILL.md"
    sourceType: local
    description: "Annual digital-legacy review. Compiles the document survivors need: account inventory, password-manager unlock instructions, will and POA references, key-contact directory, email-account succession (Apple Legacy Contact, Google Inactive Account Manager, etc.), and a survivor instruction packet. Universal in importance, situational in priority. Triggers: \"digital legacy\", \"estate plan\", \"what happens if I die\", \"legacy contact\"."
  - slug: records-op-document-audit
    name: "Records: op-document-audit"
    path: "records/skills/op-document-audit/SKILL.md"
    sourceType: local
    description: "Quarterly document audit. Checks all identity documents, legal documents, and professional credentials for expiration within 12 months, missing documents, documents needing review, and storage gaps (physical on file, no digital backup). Flags renewal actions with lead times. Triggers: \"document audit\", \"records check\", \"ID expiration\", \"important documents\"."
  - slug: records-op-monthly-sync
    name: "Records: op-monthly-sync"
    path: "records/skills/op-monthly-sync/SKILL.md"
    sourceType: local
    description: "Full records data sync on the 1st of each month. Recalculates days-to-expiration for all tracked documents, flags documents newly entering the 90-day alert window, reviews subscriptions for price changes and usage, checks legal document currency, and triggers the review brief. Triggers: \"records monthly sync\", \"sync records\", \"refresh records vault\"."
  - slug: records-op-review-brief
    name: "Records: op-review-brief"
    path: "records/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Monthly records review brief. Compiles expiring documents (with renewal steps), the full subscription review (total spend, unused services, upcoming renewals, keep/cancel recommendations), upcoming renewals across categories, document gaps, legal document review flags, and storage gaps into a single briefing with action items sorted by urgency. Subsumes the prior standalone subscription-review op — there is no separate subscription brief; the table lives here. Triggers: \"records brief\", \"document review\", \"subscription audit\", \"what's expiring\", \"what am I paying for\", \"subscription review\"."
  - slug: records-task-apply-retention-policy
    name: "Records: task-apply-retention-policy"
    path: "records/skills/task-apply-retention-policy/SKILL.md"
    sourceType: local
    description: "Annual retention sweep. Moves expired or aged-out documents from 00_current/ to 01_prior/ (or flags for purge) according to category-specific retention rules: tax >7 years, expired insurance >3 years, pay stubs >3 years, expired identity docs >1 year after replacement, etc."
  - slug: records-task-build-account-inventory
    name: "Records: task-build-account-inventory"
    path: "records/skills/task-build-account-inventory/SKILL.md"
    sourceType: local
    description: "Builds a comprehensive inventory of every online account / login the user has, drawn from 1Password, Gmail account-confirmation emails, and manual additions. Foundational for digital-legacy planning, breach response, and account cleanup. Reads metadata only — never reads passwords."
  - slug: records-task-build-vault-index
    name: "Records: task-build-vault-index"
    path: "records/skills/task-build-vault-index/SKILL.md"
    sourceType: local
    description: "Generates 00_current/INDEX.md — the canonical written index of every document in the vault with category, holder, expiration, physical and digital storage locations, and which domain agents depend on it. Closes the paragon non-negotiable: \"vault index exists and is current.\""
  - slug: records-task-detect-subscriptions-from-email
    name: "Records: task-detect-subscriptions-from-email"
    path: "records/skills/task-detect-subscriptions-from-email/SKILL.md"
    sourceType: local
    description: "Parses Gmail for recurring-charge receipts (Stripe, PayPal, Apple, Google, direct merchant emails) and seeds or refreshes the subscription registry at 00_current/subscriptions.md. Subsumes the prior flow-build-subscription-summary work — this task both detects new subscriptions from email and rebuilds the active table."
  - slug: records-task-flag-expiring-id
    name: "Records: task-flag-expiring-id"
    path: "records/skills/task-flag-expiring-id/SKILL.md"
    sourceType: local
    description: "Writes an ID expiration flag to open-loops.md with document type, holder name, expiration date, days until effective renewal deadline (using document-specific lead times), step-by-step renewal action, official renewal portal link, and cost. Urgency calibrated by document type."
  - slug: records-task-ingest-from-gmail
    name: "Records: task-ingest-from-gmail"
    path: "records/skills/task-ingest-from-gmail/SKILL.md"
    sourceType: local
    description: "Scans Gmail for receipts, policy documents, account confirmations, IRS letters, and other records-worthy attachments. Surfaces candidates that should be filed via task-log-document. Closes the \"important documents stuck in email\" gap. Uses the native Gmail connector when available; otherwise falls back to the IMAP / Gmail API path."
  - slug: records-task-log-document
    name: "Records: task-log-document"
    path: "records/skills/task-log-document/SKILL.md"
    sourceType: local
    description: "Adds a new document to vault/records/ with document type, holder, issue date, expiration date, issuing authority, physical storage location, and digital storage location. Routes to the correct subfolder by document type. Creates the expiration tracking record."
  - slug: records-task-rename-to-convention
    name: "Records: task-rename-to-convention"
    path: "records/skills/task-rename-to-convention/SKILL.md"
    sourceType: local
    description: "Lints filenames in 00_current/ (and the configured Drive folder, if connected) against the convention YYYY-MM-DD_Source-Type-Description.ext. Reports violations and proposes a rename plan; only renames files after the user confirms. Closes the paragon non-negotiable \"naming convention 100% applied.\""
  - slug: records-task-track-password-rotation
    name: "Records: task-track-password-rotation"
    path: "records/skills/task-track-password-rotation/SKILL.md"
    sourceType: local
    description: "Tracks password-rotation cadence for high-value accounts (primary email, banking, brokerage, work). Optional — many security experts now argue against routine rotation absent a breach, so this task is opt-in via config. When enabled, surfaces accounts overdue for rotation and accounts implicated in a known breach."
  - slug: records-task-update-key-contacts
    name: "Records: task-update-key-contacts"
    path: "records/skills/task-update-key-contacts/SKILL.md"
    sourceType: local
    description: "Maintains the user-configurable directory of critical professional contacts — the people who get called in an emergency or end-of-quarter scramble. The contact list is fully user-defined; common roles include lawyer, accountant, financial advisor, primary doctor, dentist, insurance agent, landlord / property manager, mechanic, and IT / handyperson."
  - slug: records-task-update-open-loops
    name: "Records: task-update-open-loops"
    path: "records/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Writes records flags (expiring IDs with renewal deadlines, outdated legal documents, unused subscriptions approaching renewal, missing documents, storage gaps) to open-loops.md and resolves completed items. Archives resolved items with outcome notes."
  - slug: records-task-update-vehicle-records
    name: "Records: task-update-vehicle-records"
    path: "records/skills/task-update-vehicle-records/SKILL.md"
    sourceType: local
    description: "Maintains a per-vehicle record: VIN, make / model / year, registration expiry, title location, insurance card, maintenance log, and recall status. Most adults have at least one vehicle and the records are spread across DMV, insurer, dealer, and mechanic."
  - slug: records-task-verify-backup
    name: "Records: task-verify-backup"
    path: "records/skills/task-verify-backup/SKILL.md"
    sourceType: local
    description: "Monthly check that critical-document backups are current. Verifies cloud-sync timestamps for the configured backup target, confirms an offsite copy exists for legal documents, and records the verification in 00_current/backup-verification-log.md."
  - slug: social-app-linkedin.portal
    name: "Social: app-linkedin.portal"
    path: "social/skills/app-linkedin.portal/SKILL.md"
    sourceType: local
    description: "Accesses LinkedIn connections list, profile data, and messaging via Playwright with Chrome cookies. Used by social-agent for professional relationship review, dormant connection identification, and reconnection queuing. Must use headless=False — LinkedIn blocks headless browsers. Configure Chrome profile path in vault/social/config.md."
  - slug: social-flow-build-outreach-queue
    name: "Social: flow-build-outreach-queue"
    path: "social/skills/flow-build-outreach-queue/SKILL.md"
    sourceType: local
    description: "Generates a prioritized outreach list covering birthdays in 14 days, overdue relationships, and warm reconnect opportunities."
  - slug: social-flow-build-relationship-health-summary
    name: "Social: flow-build-relationship-health-summary"
    path: "social/skills/flow-build-relationship-health-summary/SKILL.md"
    sourceType: local
    description: "Generates a relationship health table showing all tracked contacts with last contact date, health status, and relationship tier."
  - slug: social-flow-group-circle-management
    name: "Social: flow-group-circle-management"
    path: "social/skills/flow-group-circle-management/SKILL.md"
    sourceType: local
    description: "For users with named recurring groups (book club, peer group, friend group, parent group, mastermind), tracks group-level cadence separately from individual contact cadence. A group meeting counts as group health but not as individual one-on-one health. Optional v2 skill — only relevant when the user has named groups in their config."
  - slug: social-op-birthday-watch
    name: "Social: op-birthday-watch"
    path: "social/skills/op-birthday-watch/SKILL.md"
    sourceType: local
    description: "Weekly birthday and milestone watch that surfaces upcoming birthdays and life events in the next 14 days with suggested actions. Triggers: \"birthdays this week\", \"upcoming birthdays\", \"who has a birthday\", \"milestone check\"."
  - slug: social-op-family-relationships-review
    name: "Social: op-family-relationships-review"
    path: "social/skills/op-family-relationships-review/SKILL.md"
    sourceType: local
    description: "Weekly review of family-tier contacts (partner, parents, children, siblings, extended family the user has flagged as family-tier). Surfaces last meaningful contact, upcoming family events from Calendar, and any open follow-ups. Family is intentionally a separate tier from friends because cadence expectations differ."
  - slug: social-op-local-community-review
    name: "Social: op-local-community-review"
    path: "social/skills/op-local-community-review/SKILL.md"
    sourceType: local
    description: "Monthly review of geographically-local contacts within a configurable radius. Flags upcoming local events from Gmail, Calendar, and any configured neighborhood sources. Surfaces one community-presence action per month so digital connection doesn't fully replace local presence."
  - slug: social-op-relationship-review
    name: "Social: op-relationship-review"
    path: "social/skills/op-relationship-review/SKILL.md"
    sourceType: local
    description: "Monthly relationship health check that reviews contact recency, flags relationships going cold, and generates a prioritized outreach queue. Triggers: \"relationship review\", \"who should I reach out to\", \"social health\", \"relationship check\"."
  - slug: social-op-review-brief
    name: "Social: op-review-brief"
    path: "social/skills/op-review-brief/SKILL.md"
    sourceType: local
    description: "Weekly social review brief. Compiles upcoming birthdays, relationship health flags, and outreach suggestions into a single briefing for Ben's morning brief. Triggers: \"social brief\", \"relationship update\", \"who should I reach out to\", \"birthday reminders\"."
  - slug: social-task-detect-reciprocity-gap
    name: "Social: task-detect-reciprocity-gap"
    path: "social/skills/task-detect-reciprocity-gap/SKILL.md"
    sourceType: local
    description: "Reads the interaction log and last-signals data; flags contacts where the last 3+ interactions were initiated by the other side, or where recent interactions were ask-only with no give. Surfaces reciprocity imbalance before it erodes the relationship."
  - slug: social-task-flag-overdue-contact
    name: "Social: task-flag-overdue-contact"
    path: "social/skills/task-flag-overdue-contact/SKILL.md"
    sourceType: local
    description: "Writes a relationship flag to vault/social/open-loops.md when a close contact hasn't been reached in 90+ days or a professional contact in 180+ days, with name, last contact date, and suggested outreach type."
  - slug: social-task-flag-unanswered-close-circle-message
    name: "Social: task-flag-unanswered-close-circle-message"
    path: "social/skills/task-flag-unanswered-close-circle-message/SKILL.md"
    sourceType: local
    description: "Daily Gmail scan for unread or unreplied messages from close-circle contacts (Tier 1 + family-immediate) older than 24 hours. Writes flags to open-loops so response-time-to-close-circle stays inside the 24h paragon benchmark."
  - slug: social-task-log-interaction
    name: "Social: task-log-interaction"
    path: "social/skills/task-log-interaction/SKILL.md"
    sourceType: local
    description: "Records a contact interaction to vault/social/00_current/ with contact name, date, type, notes, and any follow-up promised."
  - slug: social-task-log-introduction-made
    name: "Social: task-log-introduction-made"
    path: "social/skills/task-log-introduction-made/SKILL.md"
    sourceType: local
    description: "Records introductions the user makes between two of their contacts. Tracks who was connected to whom, when, the context, and the outcome. Functions as a social-capital ledger and a reciprocity reminder — making introductions is high-value relational currency."
  - slug: social-task-log-new-person-met
    name: "Social: task-log-new-person-met"
    path: "social/skills/task-log-new-person-met/SKILL.md"
    sourceType: local
    description: "Lightweight capture of someone new the user just met (event, conference, intro, party). Records name, context, follow-up plan, and status. Decays into the contact roster if followed up; archived to a \"met-once\" file if not, so the primary roster stays clean."
  - slug: social-task-plan-special-occasion-gift
    name: "Social: task-plan-special-occasion-gift"
    path: "social/skills/task-plan-special-occasion-gift/SKILL.md"
    sourceType: local
    description: "Surfaces upcoming gift occasions (birthdays, anniversaries, weddings, baby showers, holidays, graduations) with lead-time, budget, and idea log. Most adults forget gifts they meant to give; this task makes the planning explicit."
  - slug: social-task-pull-relationship-signals-from-gmail-calendar
    name: "Social: task-pull-relationship-signals-from-gmail-calendar"
    path: "social/skills/task-pull-relationship-signals-from-gmail-calendar/SKILL.md"
    sourceType: local
    description: "Uses Claude Desktop's native Gmail and Calendar connectors to pull last-email and last-meeting dates per tracked contact, replacing manual interaction logging for the most common channels. Falls back to task-log-interaction for in-person, phone, and text-only contacts."
  - slug: social-task-schedule-social-commitment
    name: "Social: task-schedule-social-commitment"
    path: "social/skills/task-schedule-social-commitment/SKILL.md"
    sourceType: local
    description: "Writes a calendar event via the native Calendar connector for a planned outreach (coffee, call, meal, video chat) so social time becomes calendared rather than aspirational. Logs the planned commitment to the interaction log as \"planned\" status so reciprocity and outreach-goal tracking can see the intent."
  - slug: social-task-set-weekly-outreach-goal
    name: "Social: task-set-weekly-outreach-goal"
    path: "social/skills/task-set-weekly-outreach-goal/SKILL.md"
    sourceType: local
    description: "Sets a weekly outreach target (e.g., \"3 outreach messages, 1 coffee chat, 1 phone call\") and tracks progress against it. Surfaces progress in op-review-brief so social effort becomes an explicit weekly goal rather than a vibes-based intent."
  - slug: social-task-track-card-note-sending
    name: "Social: task-track-card-note-sending"
    path: "social/skills/task-track-card-note-sending/SKILL.md"
    sourceType: local
    description: "Tracks handwritten cards, thank-you notes, condolence cards, and holiday cards. For users who maintain a card-writing practice. Surfaces who is owed a card, what's been sent, and who is on the annual holiday-card list. Optional v2 skill."
  - slug: social-task-update-open-loops
    name: "Social: task-update-open-loops"
    path: "social/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Writes all social flags (overdue relationships, upcoming birthdays, promised follow-ups) to vault/social/open-loops.md and resolves completed items."
  - slug: vision-flow-build-scorecard
    name: "Vision: flow-build-scorecard"
    path: "vision/skills/flow-build-scorecard/SKILL.md"
    sourceType: local
    description: "Assembles a domain-by-domain life scorecard with score (1-10), trend indicator, open loop count, and 1-line status per installed plugin. Scores are derived from open loop velocity and milestone activity."
  - slug: vision-flow-cross-domain-vision-pull
    name: "Vision: flow-cross-domain-vision-pull"
    path: "vision/skills/flow-cross-domain-vision-pull/SKILL.md"
    sourceType: local
    description: "Single helper that synthesizes state from every installed domain plugin. Reads each domain's open-loops.md, current state files, and recent briefs. Returns a normalized per-domain summary that other vision skills consume instead of re-implementing the same cross-domain reads."
  - slug: vision-flow-draft-quarterly-plan
    name: "Vision: flow-draft-quarterly-plan"
    path: "vision/skills/flow-draft-quarterly-plan/SKILL.md"
    sourceType: local
    description: "Drafts next quarter's OKRs based on current domain scores, open milestones, and life vision priorities. Identifies 3-5 priority domains and proposes 2-3 key results per domain."
  - slug: vision-flow-okr-scoring-rubric
    name: "Vision: flow-okr-scoring-rubric"
    path: "vision/skills/flow-okr-scoring-rubric/SKILL.md"
    sourceType: local
    description: "Reproducible OKR retrospective scorer. Each KR is graded 0.0–1.0 against thresholds defined when the OKR was set, replacing ad-hoc judgement with consistent math. Called by op-quarterly-planning at quarter close and op-annual-review."
  - slug: vision-flow-score-domain-progress
    name: "Vision: flow-score-domain-progress"
    path: "vision/skills/flow-score-domain-progress/SKILL.md"
    sourceType: local
    description: "Evaluates progress toward quarterly OKRs across all domains; calculates percent complete per key result and flags OKRs at less than 50% with less than 2 weeks remaining in the quarter."
  - slug: vision-flow-validate-vision-completeness
    name: "Vision: flow-validate-vision-completeness"
    path: "vision/skills/flow-validate-vision-completeness/SKILL.md"
    sourceType: local
    description: "Verifies the life vision document covers every configured horizon and every configured vision domain. Called by op-annual-review and on demand. Surfaces missing horizons or domains as flags in open-loops.md."
  - slug: vision-op-annual-review
    name: "Vision: op-annual-review"
    path: "vision/skills/op-annual-review/SKILL.md"
    sourceType: local
    description: "December annual life review; retrospective on goals achieved across all domains, life vision document refresh, and next year's priority targets. The single most important op of the year. Triggers: \"annual review\", \"year review\", \"end of year\", \"life vision review\"."
  - slug: vision-op-monthly-scorecard
    name: "Vision: op-monthly-scorecard"
    path: "vision/skills/op-monthly-scorecard/SKILL.md"
    sourceType: local
    description: "Monthly life scorecard; scores each active life domain (1-10) based on open loops resolved, goals on pace, and positive milestones. Produces a trend view showing which domains are improving, stalling, or declining. Supports a `--brief` mode that emits a lightweight read-only snapshot from cached state without recomputation. Triggers: \"life scorecard\", \"monthly scorecard\", \"how am I doing\", \"life review\", \"vision brief\"."
  - slug: vision-op-quarterly-planning
    name: "Vision: op-quarterly-planning"
    path: "vision/skills/op-quarterly-planning/SKILL.md"
    sourceType: local
    description: "Structured quarterly planning session. Reviews prior quarter OKRs, runs a retrospective, and sets new OKRs for the next quarter aligned to the life vision. Triggers: \"quarterly planning\", \"set goals\", \"quarterly review\", \"Q planning session\"."
  - slug: vision-op-vision-snapshot
    name: "Vision: op-vision-snapshot"
    path: "vision/skills/op-vision-snapshot/SKILL.md"
    sourceType: local
    description: "10-minute readable digest of current life vision, values statement, theme of year, and active OKRs. Designed for \"where am I pointing right now?\" — read in one sitting, recover focus when drift suspected. Triggers: \"vision snapshot\", \"what am I working toward\", \"show me my vision\"."
  - slug: vision-op-year-in-review
    name: "Vision: op-year-in-review"
    path: "vision/skills/op-year-in-review/SKILL.md"
    sourceType: local
    description: "Backward-looking annual reflection (Dec / Jan). Walks through the year's wins, losses, biggest changes, surprises, what worked, what didn't, and the lessons carried forward. Distinct from op-annual-review which is forward-looking goal setting; this looks back. Triggers: \"year in review\", \"year recap\", \"looking back\", \"year reflection\"."
  - slug: vision-task-decision-alignment-check
    name: "Vision: task-decision-alignment-check"
    path: "vision/skills/task-decision-alignment-check/SKILL.md"
    sourceType: local
    description: "On-demand \"is this aligned with my vision and values?\" filter for major decisions (job change, relocation, large purchase, relationship commitment). Reads the life vision doc, values statement, and current OKRs, then returns yes / no / conditional with rationale."
  - slug: vision-task-flag-stalled-goal
    name: "Vision: task-flag-stalled-goal"
    path: "vision/skills/task-flag-stalled-goal/SKILL.md"
    sourceType: local
    description: "Writes a stalled goal flag to vault/vision/open-loops.md when a goal has had no progress for more than 42 days. Includes goal description, domain, last activity date, and recommended next action (recommit, modify, or drop)."
  - slug: vision-task-log-milestone
    name: "Vision: task-log-milestone"
    path: "vision/skills/task-log-milestone/SKILL.md"
    sourceType: local
    description: "Records a life milestone to vault/vision/00_current/ with domain, description, date achieved, and notes. Feeds the annual review retrospective and monthly scorecard positive signals."
  - slug: vision-task-mark-life-chapter
    name: "Vision: task-mark-life-chapter"
    path: "vision/skills/task-mark-life-chapter/SKILL.md"
    sourceType: local
    description: "Tags the user's current life chapter (e.g., \"early career\", \"young parent\", \"empty nest\", \"second act\"). The chapter informs which paragon benchmarks apply and which v2 skills are surfaced. Optional but useful at major-transition moments."
  - slug: vision-task-set-theme-of-year
    name: "Vision: task-set-theme-of-year"
    path: "vision/skills/task-set-theme-of-year/SKILL.md"
    sourceType: local
    description: "Captures a single word or short phrase framing for the year (\"build\", \"rest\", \"depth\", \"ship\"). Lightweight discipline that compounds across the year — every quarterly plan, monthly scorecard, and decision check can reference it."
  - slug: vision-task-update-bucket-list
    name: "Vision: task-update-bucket-list"
    path: "vision/skills/task-update-bucket-list/SKILL.md"
    sourceType: local
    description: "Maintains the lifetime-goals roster — things to do once, big or small (run a marathon, see northern lights, write a book, learn an instrument). Distinct from current-quarter OKRs. Read by flow-cross-domain-vision-pull and op-vision-snapshot."
  - slug: vision-task-update-life-vision
    name: "Vision: task-update-life-vision"
    path: "vision/skills/task-update-life-vision/SKILL.md"
    sourceType: local
    description: "Writes and versions the life vision document with explicit 5-year, 10-year, and 25-year horizons. Enforces coverage of every configured vision domain. The vision doc is the foundational artifact every other vision skill depends on; this task is the only way it gets created or updated."
  - slug: vision-task-update-open-loops
    name: "Vision: task-update-open-loops"
    path: "vision/skills/task-update-open-loops/SKILL.md"
    sourceType: local
    description: "Writes all vision flags (stalled goals, OKRs off-pace, domain score declines) to vault/vision/open-loops.md and resolves completed items."
  - slug: vision-task-update-values-statement
    name: "Vision: task-update-values-statement"
    path: "vision/skills/task-update-values-statement/SKILL.md"
    sourceType: local
    description: "Captures and versions the explicit values statement that sits beneath the life vision document. Reviewed annually by op-annual-review and referenced on demand by task-decision-alignment-check."
